server:
  enabled: true
  # Override chart 1.1.1's default tag (1.30.3) → 1.30.4 (Docker Hub
  # 2026-04-10). Temporal cuts patch images more often than helm-chart
  # releases, so the chart can lag the server by weeks. Bump this line
  # whenever a relevant fix lands; a chart-level bump (1.1.x → 1.2.x)
  # will reset our override only if the chart's own default goes ABOVE
  # this value.
  image:
    repository: temporalio/server
    tag: 1.30.4
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    logLevel: "info"
    persistence:
      defaultStore: default
      visibilityStore: visibility
      numHistoryShards: 1
      datastores:
        default:
          sql:
            createDatabase: false
            manageSchema: true
            pluginName: postgres12
            driverName: postgres12
            databaseName: temporal
            connectAddr: "temporal-database-rw.cloudnative-pg.svc.cluster.local:5432"
            # Temporal server 1.28+ refuses to boot without this —
            # chart v1.1.1 doesn't set it by default, which is why every
            # frontend/history/matching/worker pod was CrashLooping with
            # `Persistence.DataStores[...].SQL.ConnectProtocol: zero value`.
            connectProtocol: "tcp"
            user: temporal
            existingSecret: temporal-db-secret
            secretKey: password
        visibility:
          sql:
            createDatabase: false
            manageSchema: true
            pluginName: postgres12
            driverName: postgres12
            databaseName: temporal_visibility
            connectAddr: "temporal-database-rw.cloudnative-pg.svc.cluster.local:5432"
            connectProtocol: "tcp"
            user: temporal
            existingSecret: temporal-db-secret
            secretKey: password
  frontend:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  history:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  matching:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
  worker:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

schema:
  useHelmHooks: false
  backoffLimit: 20
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

admintools:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

web:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
