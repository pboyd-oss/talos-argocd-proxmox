apiVersion: apps/v1
kind: Deployment
metadata:
  name: plugins
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: plugins
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: plugins
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: plugins
      annotations:
        instrumentation.opentelemetry.io/inject-nodejs: "opentelemetry/default"
    spec:
      initContainers:
        - name: fetch-mmdb
          image: ghcr.io/posthog/posthog/property-defs-rs:master@sha256:98f5823d7fe411d3a385971e27b0b63da2da8c7401d75e865e3f7f3a7e77671f
          command:
            - sh
            - -c
            - cp /app/share/GeoLite2-City.mmdb /shared/GeoLite2-City.mmdb
          volumeMounts:
            - name: mmdb
              mountPath: /shared
      containers:
        - name: plugins
          image: posthog/posthog-node:latest@sha256:863e76e040ad41aef79f605c33ec71f1529bddf94cfd88941c935da9bde97235
          command:
            - node
            - nodejs/dist/index.js
          volumeMounts:
            - name: mmdb
              mountPath: /code/share
              readOnly: true
          envFrom:
            - configMapRef:
                name: posthog-env
          env:
            - name: MMDB_FILE_LOCATION
              value: "/code/share/GeoLite2-City.mmdb"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-secret
            - name: ENCRYPTION_SALT_KEYS
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: encryption-salt-keys
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: PERSONS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: BEHAVIORAL_COHORTS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: CYCLOTRON_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-access-key
            - name: OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-secret-key
            - name: SESSION_RECORDING_V2_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-access-key
            - name: SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-secret-key
            - name: SESSION_RECORDING_V2_S3_TIMEOUT_MS
              value: "120000"
            - name: COOKIELESS_REDIS_HOST
              value: "redis7"
            - name: COOKIELESS_REDIS_PORT
              value: "6379"
            - name: SESSION_RECORDING_API_REDIS_HOST
              value: "redis7"
            - name: SESSION_RECORDING_API_REDIS_PORT
              value: "6379"
            - name: CDP_REDIS_HOST
              value: "redis7"
            - name: CDP_REDIS_PORT
              value: "6379"
            - name: LOGS_REDIS_HOST
              value: "redis7"
            - name: LOGS_REDIS_PORT
              value: "6379"
            - name: LOGS_REDIS_TLS
              value: "false"
          ports:
            - containerPort: 6738
              name: http
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: mmdb
          emptyDir:
            sizeLimit: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: plugins
  namespace: posthog
spec:
  ports:
    - name: http
      port: 6738
      targetPort: 6738
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: plugins
