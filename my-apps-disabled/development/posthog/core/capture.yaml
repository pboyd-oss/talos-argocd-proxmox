apiVersion: apps/v1
kind: Deployment
metadata:
  name: capture
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: capture
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: capture
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: capture
    spec:
      containers:
        - name: capture
          image: ghcr.io/posthog/posthog/capture:master@sha256:0b9820431d963fe3767c9cd911ef46b469995b4557524eb03f9569557d73701f
          env:
            - name: ADDRESS
              value: "0.0.0.0:3000"
            - name: KAFKA_TOPIC
              value: "events_plugin_ingestion"
            - name: KAFKA_HOSTS
              value: "kafka:9092"
            - name: REDIS_URL
              value: "redis://redis7:6379/"
            - name: CAPTURE_MODE
              value: "events"
            - name: RUST_LOG
              value: "info,rdkafka=warn"
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: capture
  namespace: posthog
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: capture
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: replay-capture
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: replay-capture
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: replay-capture
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: replay-capture
    spec:
      containers:
        - name: replay-capture
          image: ghcr.io/posthog/posthog/capture:master@sha256:0b9820431d963fe3767c9cd911ef46b469995b4557524eb03f9569557d73701f
          envFrom:
            - configMapRef:
                name: posthog-env
          env:
            - name: ADDRESS
              value: "0.0.0.0:3000"
            - name: KAFKA_TOPIC
              value: "session_recording_snapshot_item_events"
            - name: KAFKA_HOSTS
              value: "kafka:9092"
            - name: REDIS_URL
              value: "redis://redis7:6379/"
            - name: CAPTURE_MODE
              value: "recordings"
            - name: RUST_LOG
              value: "info,rdkafka=warn"
            - name: OBJECT_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-access-key
            - name: OBJECT_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-secret-key
            - name: SESSION_RECORDING_V2_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-access-key
            - name: SESSION_RECORDING_V2_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: rustfs-secret-key
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: replay-capture
  namespace: posthog
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: replay-capture
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-flags
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: feature-flags
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1  # Required for /decide endpoint (session replay, feature flags)
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: feature-flags
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: feature-flags
    spec:
      initContainers:
        - name: copy-geoip
          # Pinned to pre-WarpStream SHA — see jobs.yaml header comment.
          image: posthog/posthog:latest@sha256:334b0b6a604d0cde5f48af199bac141b26f8867ed2f6fd77435cf859a9537d76
          command:
            - /bin/sh
            - -c
            - |
              cp /code/share/GeoLite2-City.mmdb /share/GeoLite2-City.mmdb
              ls -la /share/GeoLite2-City.mmdb
              echo "GeoIP database copied successfully"
          volumeMounts:
            - name: geoip-data
              mountPath: /share
      containers:
        - name: feature-flags
          image: ghcr.io/posthog/posthog/feature-flags:master@sha256:125e67faa5ea6b682494e87fd7c4f7d08c710fa67ac918d60d533337b809a058
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-password
            - name: WRITE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: READ_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: PERSONS_WRITE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: PERSONS_READ_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets
                  key: posthog-db-url
            - name: MAXMIND_DB_PATH
              value: "/share/GeoLite2-City.mmdb"
            - name: REDIS_URL
              value: "redis://redis7:6379/"
            - name: ADDRESS
              value: "0.0.0.0:3001"
            - name: RUST_LOG
              value: "info"
            - name: COOKIELESS_REDIS_HOST
              value: "redis7"
            - name: COOKIELESS_REDIS_PORT
              value: "6379"
          ports:
            - containerPort: 3001
              name: http
          volumeMounts:
            - name: geoip-data
              mountPath: /share
          livenessProbe:
            httpGet:
              path: /_readiness
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: geoip-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: feature-flags
  namespace: posthog
spec:
  ports:
    - name: http
      port: 3001
      targetPort: 3001
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: feature-flags
