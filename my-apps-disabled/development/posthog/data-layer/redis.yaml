apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis7
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: redis7
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: redis7
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: redis7
    spec:
      containers:
      - name: redis7
        image: valkey/valkey:8.0-alpine
        command: [ "redis-server", "--maxmemory-policy", "allkeys-lru", "--maxmemory", "512mb" ]
        ports:
        - containerPort: 6379
          name: redis
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 3
          timeoutSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 768Mi
        volumeMounts:
        - name: redis7-data
          mountPath: /data
      volumes:
      - name: redis7-data
        persistentVolumeClaim:
          claimName: redis7-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis7
  namespace: posthog
spec:
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: redis7
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis7-data
  namespace: posthog
  labels:
    app: posthog-redis
    backup: "daily"
  annotations:
    # TEMPORARY (2026-05-01): wiping posthog data + starting fresh.
    # Remove once posthog is back up on fresh data.
    volsync.backup/skip-restore: "true"
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
