# ---------------------------------------------------------------
# EXPERIMENTAL TUNING — 2026-04-25
# ---------------------------------------------------------------
# Sampling and ctx values below are an in-flight A/B experiment, NOT
# validated rules. Aimed at the cluster's actual workload mix:
# tool-calling, agentic tasks, Vane/Perplexica research, n8n/Karakeep
# utility — explicitly NOT code generation. If something regresses
# (tool-call quality, JSON validity, RP coherence on uncensored,
# agent-loop behavior) revert the relevant preset rather than treating
# these numbers as canonical. See git history for prior values.
# ---------------------------------------------------------------
#
# Consumed by llama-server via `--models-preset /config/presets.ini` (see
# deployment.yaml). Each [section] is a selectable model preset; the
# section-name BEFORE the " - " is the OpenAI-API-compatible model ID
# that clients send in their `model` field.
#
# Three model families live here:
#   Qwen 3.6         - primary everything (text + coding + tool calls + vision)
#   Gemma 4 (26B)    - multimodal fallback (kept in case Qwen 3.6's vision
#                      regresses on something Gemma handles well)
#   Qwen 3.5 uncens. - unfiltered variant for adult / red-team / jailbreak work
#
# Qwen 3.6 now has vision via `mmproj-BF16.gguf` (Unsloth), so it covers
# every real workload — chat, agentic tool calls, and image input — from
# a single resident set of weights. Both Qwen 3.6 presets (think and
# nothink) share the same GGUF + mmproj: switching between them is just a
# chat-template change, no weight reload.
#
# Why NOT vanilla Qwen 3.5 here: replaced by Qwen 3.6, which is strictly
# better for tool-calling (improved nested-object parsing) and longer
# context (256K native).
#
# The old Qwen3.5 GGUFs can stay on the NFS share as fallbacks, but they
# aren't mapped to any preset so nothing in the cluster can select them
# via the API.

# ==========================================================
# QWEN 3.6 35B-A3B [THINK]  - primary general / coding / agentic / vision
# ==========================================================
# 35B total / 3B active (MoE). Unsloth UD-Q4_K_XL quant (~23GB).
# Native 256K context, extendable to 1M with YaRN. We run at 64K
# as the sweet spot for a single 3090 with 128GB system RAM:
#   - KV cache ~4.8GB at q8_0, spills only ~2GB into CUDA unified
#     memory (CPU-driven attention for spilled pages — minimal hit).
#   - Holds every realistic tool payload we see: Perplexica search
#     results (~15-30K tokens), OpenWebUI chat + RAG (~20-40K),
#     n8n paperless-tagger docs (<5K), Karakeep URLs (<10K).
#   - At 128K we'd spill ~7GB, costing real CPU cycles — painful on
#     a node that may be downclocked. Not worth it for the edge cases.
# If a specific workload ever needs >64K, add a dedicated
# `qwen3.6-longctx` preset instead of raising the default.
#
# Multimodal via mmproj-BF16.gguf (Unsloth's vision projector) — so
# this preset handles text, coding, tool calls, AND vision. One model
# covers every real use case on this cluster; Gemma 4 is kept only
# as a multimodal fallback.
#
# Sampling is Unsloth's official "general THINK" profile (temp=1.0,
# presence-penalty=1.5) — diversity for the <think> exploration plus
# presence-penalty>0 to break repetitive tool-call / reasoning loops.
# We deliberately do NOT use Unsloth's "precise coding" profile here
# because this cluster's workloads are agentic / utility / research,
# not code generation.
[qwen3.6 - qwen3.6-35b-a3b]
model = /models/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf
mmproj = /models/mmproj-BF16.gguf
alias = qwen3.6, qwen 3.6, general, agentic, vision, image, multimodal
ctx-size = 65536
n-gpu-layers = 99
temp = 1.0
top-p = 0.95
top-k = 20
min-p = 0.0
presence-penalty = 1.5
chat-template-kwargs = {"enable_thinking": true}
jinja = 1

# ==========================================================
# QWEN 3.6 35B-A3B [NOTHINK]  - tool calls, structured output, short timeouts
# ==========================================================
# Same GGUF + mmproj as the think variant — switching presets is
# instant (weights stay resident, just the chat template changes).
# Use this for:
#   - K8sGPT (short timeout, wants fast structured output)
#   - n8n workflows that parse JSON-only responses
#   - Karakeep tagger (classification, JSON-only)
#   - Any tool-call loop where <think> tokens would pollute parsing
# Unsloth's "general Instruct/nothink" profile: temp=0.7, top_p=0.8,
# presence-penalty=1.5. Lower top_p tightens JSON/tool-call output;
# presence-penalty=1.5 stops agent loops re-issuing the same tool.
[qwen3.6-nothink - qwen3.6-35b-a3b-nothink]
model = /models/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf
mmproj = /models/mmproj-BF16.gguf
alias = qwen3.6-nothink, nothink, fast, tools, vision-nothink
ctx-size = 65536
n-gpu-layers = 99
temp = 0.7
top-p = 0.8
top-k = 20
min-p = 0.0
presence-penalty = 1.5
chat-template-kwargs = {"enable_thinking": false}
jinja = 1

# ==========================================================
# QWEN 3.6 35B-A3B [MAXCTX NOTHINK]  - Vane/Perplexica research loops
# ==========================================================
# Same GGUF + mmproj as the main qwen3.6 presets — switching to this
# preset just re-sizes the KV cache, no weight reload. Exists because
# Vane (formerly Perplexica) accumulates scraped page content across
# research iterations; long sessions can cross 100K tokens and the
# cluster's primary use cases (agentic tools / research / utility)
# benefit from never having to think about context ceilings.
#
# ctx-size = 262144 (256K = Qwen3.6's native max, no YaRN required).
# KV cache @ 256K with q8_0 ≈ 14GB; ~7GB stays in VRAM, ~7GB spills
# into CUDA unified memory backed by 128GB system RAM. Attention on
# spilled pages is CPU-driven and slower, but Vane / Perplexica /
# n8n research loops are already async — throughput is acceptable
# and the ceiling is now well above any prompt the cluster generates.
# (1M via YaRN is technically possible but ~56GB KV is impractical
# on a single 3090 + 128GB host.)
#
# Sampling: Unsloth "general Instruct" (temp=0.7, top_p=0.8) plus
# presence-penalty=1.5 — critical for research loops to stop the
# agent re-fetching the same URL or re-citing the same chunk.
# Nothink because Vane/Perplexica are pure tool-call agents; <think>
# tokens would inflate history and burn the very ctx we're growing.
[qwen3.6-longctx - qwen3.6-35b-a3b-longctx]
model = /models/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf
mmproj = /models/mmproj-BF16.gguf
alias = qwen3.6-longctx, longctx, maxctx, perplexica, vane, research
ctx-size = 262144
n-gpu-layers = 99
temp = 0.7
top-p = 0.8
top-k = 20
min-p = 0.0
presence-penalty = 1.5
chat-template-kwargs = {"enable_thinking": false}
jinja = 1

# ==========================================================
# GEMMA 4 26B-A4B [THINK]  - multimodal fallback
# ==========================================================
# Qwen 3.6 is now the primary multimodal model (it has its own mmproj).
# Gemma 4 is kept here as a fallback in case a specific workload does
# better on Gemma's vision projector — and because it's a nice second
# opinion to have loadable on demand. 26B total / 3.8B active (MoE,
# 128 experts, 8+1 active). ~17GB + 850MB mmproj, plenty of headroom
# on a single 3090. Google-recommended sampling: temp=1.0, top_p=0.95,
# top_k=64.
[gemma4 - gemma4-26b]
model = /models/gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf
mmproj = /models/mmproj-gemma4-BF16.gguf
# Aliases intentionally do NOT include generic `vision`/`image`/`multimodal` —
# those belong to the primary qwen3.6 preset. llama-server rejects the
# entire presets.ini if two presets share any alias (even across files).
alias = gemma4, gemma 4, gemma4-think
ctx-size = 131072
n-gpu-layers = 99
temp = 1.0
top-p = 0.95
top-k = 64
min-p = 0.0
presence-penalty = 1.5
chat-template-kwargs = {"enable_thinking": true}
jinja = 1

# ==========================================================
# GEMMA 4 26B-A4B [NOTHINK]  - fast vision captioning
# ==========================================================
# Same GGUF as think variant. For ComfyUI's llamacpp-vision node
# and other bulk captioning where reasoning is overkill.
[gemma4-nothink - gemma4-26b-nothink]
model = /models/gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf
mmproj = /models/mmproj-gemma4-BF16.gguf
# `vision-nothink` is owned by qwen3.6-nothink — keep only Gemma-specific aliases.
alias = gemma4-nothink, gemma4-fast
ctx-size = 131072
n-gpu-layers = 99
temp = 1.0
top-p = 0.95
top-k = 64
min-p = 0.0
presence-penalty = 1.5
chat-template-kwargs = {"enable_thinking": false}
jinja = 1

# ==========================================================
# QWEN 3.5 UNCENSORED (HauhauCS Aggressive) [THINK]
# ==========================================================
# Unfiltered fine-tune of the older Qwen3.5 base. Kept because there's
# no equivalent Qwen3.6 uncensored quant available yet. Q4_K_M is 600MB
# larger than UD-Q4_K_XL, so ctx-size is dropped to 32K to keep the
# model fully GPU-resident on one 3090.
#
# Sampling tuned for red-team / adult / creative work — NOT coding.
# Standard creative/RP profile: temp=0.9 for variety, min_p=0.05 to
# cut low-prob garbage while preserving diversity, top_k=40, and a
# modest presence-penalty=0.6 (low enough to keep character voice
# consistent, high enough to avoid stuck loops). Higher than this
# would hurt coherence in long RP sessions.
[uncensored - qwen3.5-uncensored]
model = /models/Qwen3.5-35B-A3B-Uncensored-HauhauCS-Aggressive-Q4_K_M.gguf
mmproj = /models/mmproj-Qwen3.5-35B-A3B-Uncensored-HauhauCS-Aggressive-f16.gguf
alias = uncensored, nsfw, hauhau, aggressive, obliterated, think-uncensored
ctx-size = 32768
n-gpu-layers = 99
temp = 0.9
top-p = 0.95
top-k = 40
min-p = 0.05
presence-penalty = 0.6
chat-template-kwargs = {"enable_thinking": true}
jinja = 1

# ==========================================================
# QWEN 3.5 UNCENSORED [NOTHINK]  - fast unfiltered responses
# ==========================================================
# Same GGUF as think variant. For bulk generation / red-team testing
# where you don't want thinking tokens in the stream. Same creative
# sampling as the think variant — these are not coding workloads.
[nothink-uncensored - qwen3.5-uncensored-nothink]
model = /models/Qwen3.5-35B-A3B-Uncensored-HauhauCS-Aggressive-Q4_K_M.gguf
mmproj = /models/mmproj-Qwen3.5-35B-A3B-Uncensored-HauhauCS-Aggressive-f16.gguf
alias = nothink-uncensored, nothink-nsfw, fast-uncensored, nothink-obliterated
ctx-size = 32768
n-gpu-layers = 99
temp = 0.9
top-p = 0.95
top-k = 40
min-p = 0.05
presence-penalty = 0.6
chat-template-kwargs = {"enable_thinking": false}
jinja = 1
