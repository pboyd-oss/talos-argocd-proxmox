apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-cpp-server
  namespace: llama-cpp
  labels:
    app: llama-cpp-server
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: llama-cpp-server
  revisionHistoryLimit: 1
  template:
    metadata:
      labels:
        app: llama-cpp-server
    spec:
      restartPolicy: Always
      runtimeClassName: nvidia
      priorityClassName: gpu-workload-high
      terminationGracePeriodSeconds: 300 # Model unload + KV cache cleanup time
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
        - name: llama-cpp-server
          image: ghcr.io/ggml-org/llama.cpp:server-cuda12-b8840
          imagePullPolicy: IfNotPresent
          command: ["/app/llama-server"]
          args:
            - "--models-max"
            - "1"
            - "--models-preset"
            - "/config/presets.ini"
            - "-c"
            - "65536"            # Default ctx when a preset doesn't override. 64K = ~2GB KV spill on a 24GB 3090, tolerable on 128GB RAM + downclocked CPU.
            - "-ngl"
            - "99"
            - "-fa"
            - "on"        # Explicitly set to 'on' so --jinja is read correctly
            - "--jinja"
            - "--fit"           # Auto-fit dense layers to available VRAM
            - "on"
            - "--no-mmap"       # Prevent page fault stalls - load model fully into memory
            # context-shift enabled: allows graceful degradation when Perplexica search payloads exceed context
            - "--cache-type-k"
            - "q8_0"            # Quantize KV cache ~50% savings vs f16, negligible quality loss
            - "--cache-type-v"
            - "q8_0"            # q8_0 not q4_0: MoE models sensitive to V cache quantization, q4_0 adds ~0.2 perplexity
            - "-t"
            - "4"               # Low thread count for fully GPU-offloaded model (auto-detect picks too many in K8s)
            - "-b"
            - "4096"            # Logical batch for prompt processing (larger = faster prefill)
            - "-ub"
            - "512"             # Physical batch for GPU saturation
            - "--parallel"
            - "1"               # Single-user coding assistant - maximize context per request
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
          env:
            # GPU selection is handled by the device plugin + CDI.
            # Under whole-card allocation (time-slicing disabled) the plugin
            # mounts exactly one physical GPU into this pod, and that card
            # appears as device 0 inside the container. Do NOT set
            # NVIDIA_VISIBLE_DEVICES or CUDA_VISIBLE_DEVICES — either one
            # overrides the plugin's injection and causes the app to run
            # on a different card than the one the scheduler allocated.
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            - name: LLAMA_SET_ROWS
              value: "1"          # Split KV cache mode - eliminates cross-sequence attention waste
            - name: GGML_CUDA_ENABLE_UNIFIED_MEMORY
              value: "1" # Spill to system RAM if VRAM is tight with Q4_K_XL + KV cache
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 300
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: "32"
              memory: 64Gi
              nvidia.com/gpu: "1"
              ephemeral-storage: "50Gi"
            requests:
              # User prefers higher reserved CPU for llama.cpp responsiveness.
              cpu: "6"
              memory: 32Gi
              nvidia.com/gpu: "1"
              ephemeral-storage: "10Gi"
          volumeMounts:
            - name: models-storage
              mountPath: /models
            - name: config-volume
              mountPath: /config
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: models-storage
          persistentVolumeClaim:
            claimName: llama-cpp-models-pvc
        - name: config-volume
          configMap:
            name: llama-cpp-config
            items:
              - key: presets.ini
                path: presets.ini
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
      nodeSelector:
        feature.node.kubernetes.io/pci-0300_10de.present: "true"