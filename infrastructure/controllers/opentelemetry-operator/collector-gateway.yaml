apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-gateway
  namespace: opentelemetry
spec:
  mode: deployment
  replicas: 2
  serviceAccount: otel-gateway
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
            # Cap per-request body at 4 MiB — protects the public
            # otel.tuxgrid.com endpoint from fill-storage floods. A normal
            # OTLP batch is well under 1 MiB; 4 MiB is generous for big
            # span/log batches from the mobile app.
            max_request_body_size: 4194304
            # CORS is needed for OTLP/HTTP from browser / Expo-web debug
            # builds. Native RN doesn't enforce CORS. "*" is safe here
            # because the endpoint is write-only (reads are on the
            # internal Grafana).
            cors:
              allowed_origins:
                - "*"
              allowed_headers:
                - "*"
              max_age: 7200

      # Cluster-wide metrics from K8s API (pod phases, deployments, restarts, node conditions)
      k8s_cluster:
        auth_type: serviceAccount
        collection_interval: 30s
        node_conditions_to_report:
        - Ready
        - MemoryPressure
        - DiskPressure
        allocatable_types_to_report:
        - cpu
        - memory
        - nvidia.com/gpu

    processors:
      # Refuses new data if the collector is approaching its memory limit.
      # MUST be first in every pipeline so backpressure happens BEFORE
      # k8sattributes / batch allocate more memory on a malformed or
      # flood-sized payload. Tuned for the 1Gi pod limit above.
      memory_limiter:
        check_interval: 1s
        limit_mib: 800
        spike_limit_mib: 200

      # Enrich with Kubernetes metadata from API server
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.node.name
          - k8s.container.name
          - k8s.deployment.name
          - k8s.statefulset.name
          - k8s.daemonset.name
          - k8s.replicaset.name
          labels:
          - tag_name: app
            key: app
            from: pod
          - tag_name: app
            key: app.kubernetes.io/name
            from: pod
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: resource_attribute
            name: k8s.pod.name
          - from: resource_attribute
            name: k8s.namespace.name

      # Set service.name from app label if not already set
      resource:
        attributes:
        - key: service.name
          from_attribute: app
          action: upsert
        - key: k8s.cluster.name
          value: talos-prod
          action: upsert

      # Batch for efficient export
      batch:
        timeout: 10s
        send_batch_size: 8192
        send_batch_max_size: 16384

    exporters:
      # Tempo - traces via OTLP gRPC
      otlp/tempo:
        endpoint: tempo.monitoring.svc.cluster.local:4317
        tls:
          insecure: true

      # Loki - logs via OTLP HTTP
      otlphttp/loki:
        endpoint: http://loki-gateway.loki-stack.svc.cluster.local/otlp
        headers:
          X-Scope-OrgID: "1"
        tls:
          insecure: true

      # Prometheus - metrics via OTLP HTTP
      otlphttp/prometheus:
        endpoint: http://kube-prometheus-stack-prometheus.prometheus-stack.svc.cluster.local:9090/api/v1/otlp
        tls:
          insecure: true

    service:
      pipelines:
        logs:
          # `k8sobjects` removed 2026-04-20 when VPA was ripped out —
          # that receiver was watching VerticalPodAutoscaler CRs, which
          # no longer exist. Leaving its reference in the pipeline made
          # the collector refuse to boot for 9h with
          # "invalid configuration: references receiver k8sobjects
          # which is not configured". If you re-add CR-event ingestion,
          # define the k8sobjects receiver in the receivers: block above
          # THEN add it here.
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [otlphttp/loki]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [otlp/tempo]
        metrics:
          receivers: [otlp, k8s_cluster]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [otlphttp/prometheus]
