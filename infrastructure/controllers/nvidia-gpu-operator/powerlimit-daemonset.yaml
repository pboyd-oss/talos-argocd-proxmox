# GPU Power-Limit DaemonSet
#
# The NVIDIA GPU Operator does NOT manage per-card power limits.
# Without this DS, the RTX 3090s run at their default limit of 420W each
# (~840W total across both cards on this node).
#
# This DaemonSet runs on every GPU node, applies `nvidia-smi -pl <watts>`
# to every GPU it finds, then sleeps. The setting persists until the
# driver unloads (reboot / talosctl reset / driver reinstall), at which
# point the DS re-runs on pod restart and re-applies it.
#
# Valid range on RTX 3090: ~100W (min) .. 450W (max). Default is 420W.
# We cap at 220W — aggressive undervolt for thermal/power headroom.
#
# Requires:
#   - privileged container (nvidia-smi -pl needs root + driver write)
#   - hostPID (persistence-mode write is per-driver, not per-namespace)
#   - runtimeClassName: nvidia (so CDI injects GPU devices)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-powerlimit
  namespace: gpu-operator
  labels:
    app.kubernetes.io/name: nvidia-powerlimit
    app.kubernetes.io/component: power-management
    app.kubernetes.io/part-of: gpu-infrastructure
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvidia-powerlimit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvidia-powerlimit
        app.kubernetes.io/component: power-management
    spec:
      # CDI-injected nvidia-smi is available when runtimeClassName is "nvidia"
      runtimeClassName: nvidia
      # Only schedule on nodes with at least one NVIDIA GPU.
      # This label is set by the GPU Operator's node-feature-discovery.
      nodeSelector:
        nvidia.com/gpu.present: "true"
      # Match the rest of the GPU stack's tolerations so this DS is
      # allowed onto tainted GPU nodes.
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      hostPID: true
      containers:
        - name: nvidia-powerlimit
          # renovate: ignore
          # Minimal image that ships nvidia-smi. Any CUDA base tag works;
          # pin a specific SHA if you want to stop Renovate from bumping.
          # Source from NVIDIA's own registry (nvcr.io) to dodge Docker Hub
          # rate limits — same byte-identical image as docker.io/nvidia/cuda.
          image: nvcr.io/nvidia/cuda:12.8.1-base-ubuntu22.04
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              TARGET_WATTS=220

              echo "[powerlimit] waiting for nvidia-smi to become available..."
              until nvidia-smi >/dev/null 2>&1; do sleep 5; done

              GPU_COUNT=$(nvidia-smi --query-gpu=count --format=csv,noheader | head -n1)
              echo "[powerlimit] found ${GPU_COUNT} GPU(s); target=${TARGET_WATTS}W"

              # Enable persistence mode so the driver keeps the limit
              # between kernel module loads. Best-effort — some setups
              # don't allow it and that's fine.
              nvidia-smi -pm 1 || echo "[powerlimit] persistence-mode set failed (non-fatal)"

              for i in $(seq 0 $((GPU_COUNT - 1))); do
                echo "[powerlimit] setting GPU ${i} to ${TARGET_WATTS}W"
                nvidia-smi -i "${i}" -pl "${TARGET_WATTS}" \
                  || echo "[powerlimit] WARN: failed to set GPU ${i}"
              done

              echo "[powerlimit] current power limits:"
              nvidia-smi --query-gpu=index,name,power.limit,power.default_limit,power.max_limit \
                         --format=csv

              # Keep the pod alive so kubelet doesn't CrashLoop-restart
              # us every few seconds. Limits persist anyway.
              exec sleep infinity
          securityContext:
            # Required for nvidia-smi -pl; the driver rejects the ioctl
            # from an unprivileged user namespace.
            privileged: true
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "utility"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
