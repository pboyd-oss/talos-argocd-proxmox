# Webhook secret for the GitHub -> ArgoCD webhook at
# https://argocd.tuxgrid.com/api/webhook. Shared between GitHub's hook
# config and ArgoCD's argocd-server. Without this, ArgoCD has no way to
# know a push happened and falls back to a 3-min poll + 24h repo-server
# cache, which is why changes took up to a day to sync before this
# landed.
#
# Target is argocd-secret (Helm-managed by the argo-cd chart). We use
# creationPolicy: Merge so ESO only adds/refreshes the
# `webhook.github.secret` key — Helm keeps owning everything else
# (admin password, server.secretkey, etc.).
#
# 1Password item:
#   vault:    homelab-prod
#   item:     argocd-github-webhook
#   field:    secret  (the shared HMAC secret; matches the same string
#                      configured on the GitHub webhook)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-github-webhook-secret
  namespace: argocd
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: webhook.github.secret
      remoteRef:
        key: argocd-github-webhook
        property: secret
