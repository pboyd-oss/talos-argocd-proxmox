# OpenTelemetry Operator
# Standalone App at Wave 5 to ensure cert-manager (Wave 4) is ready
# for admission webhook certificates
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opentelemetry-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app.kubernetes.io/part-of: infrastructure
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/pboyd-oss/talos-argocd-proxmox.git
    targetRevision: main
    path: infrastructure/controllers/opentelemetry-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: opentelemetry
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
    retry:
      limit: -1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # NOTE: .status ignored globally by ArgoCD 3.0+ — only non-status fields listed
  ignoreDifferences:
  # OTEL operator mutates collector spec after creation
  - group: opentelemetry.io
    kind: OpenTelemetryCollector
    jsonPointers:
    - /metadata/generation
    - /metadata/annotations
  - group: external-secrets.io
    kind: ExternalSecret
    jqPathExpressions:
    - .metadata.generation
    - .metadata.finalizers
    - .spec.data[].remoteRef.conversionStrategy
    - .spec.data[].remoteRef.decodingStrategy
    - .spec.data[].remoteRef.metadataPolicy
    - .spec.data[].remoteRef.nullBytePolicy
    - .spec.target.deletionPolicy
