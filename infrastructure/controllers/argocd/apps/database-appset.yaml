apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: database
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  # Preserve skip-reconcile annotation during DR recovery
  # Without this, the ApplicationSet controller strips manual annotations
  ignoreApplicationDifferences:
  - jsonPointers:
    - /metadata/annotations/argocd.argoproj.io~1skip-reconcile
  generators:
  - git:
      repoURL: https://github.com/pboyd-oss/talos-argocd-proxmox.git
      revision: main
      directories:
      - path: infrastructure/database/*/*
  template:
    metadata:
      name: '{{path.basename}}'
      annotations:
        argocd.argoproj.io/manifest-generate-paths: '{{path}}'
        argocd.argoproj.io/sync-wave: "4"
      labels:
        app.kubernetes.io/part-of: database
    spec:
      project: infrastructure
      revisionHistoryLimit: 3
      source:
        repoURL: https://github.com/pboyd-oss/talos-argocd-proxmox.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
        - Replace=false
        retry:
          limit: -1  # Infinite retries — apps must never permanently die during bootstrap
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m
      # NOTE: .status ignored globally by ArgoCD 3.0+ — only non-status fields listed
      #
      # DO NOT add .spec.bootstrap or .spec.externalClusters here.
      # RespectIgnoreDifferences=true + ServerSideApply STRIPS those fields
      # during apply — blocks the overlay-based DR flow from ever reaching
      # the live Cluster. Each DB's root kustomization.yaml switches between
      # overlays/initdb and overlays/recovery; ArgoCD must fully apply that.
      # CNPG ignores spec.bootstrap on existing Clusters semantically (it's
      # creation-time only), so post-recovery drift between git and live is
      # cosmetic — the extra sync churn is worth it for correctness.
      ignoreDifferences:
      - group: postgresql.cnpg.io
        kind: Cluster
        jsonPointers:
        - /metadata/generation
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
        - .metadata.generation
        - .metadata.finalizers
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.data[].remoteRef.nullBytePolicy
        - .spec.target.deletionPolicy
      # PVC fields that are immutable after creation
      - group: ""
        kind: PersistentVolumeClaim
        jqPathExpressions:
        - .spec.dataSourceRef
        - .spec.dataSource
        - .spec.volumeName
        - .spec.resources.requests.storage
