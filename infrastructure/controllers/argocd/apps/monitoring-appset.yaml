apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  generators:
  - git:
      repoURL: https://github.com/pboyd-oss/talos-argocd-proxmox.git
      revision: main
      directories:
      - path: monitoring/*
  template:
    metadata:
      name: 'monitoring-{{path.basename}}'
      annotations:
        argocd.argoproj.io/manifest-generate-paths: '{{path}}'
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: monitoring
      revisionHistoryLimit: 3
      source:
        repoURL: https://github.com/pboyd-oss/talos-argocd-proxmox.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
        - Replace=false
        retry:
          limit: -1  # Infinite retries — apps must never permanently die during bootstrap
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m
      # NOTE: .status ignored globally by ArgoCD 3.0+ — only non-status fields listed
      ignoreDifferences:
      - group: gateway.networking.k8s.io
        kind: HTTPRoute
        jqPathExpressions:
        - .spec.rules[].backendRefs[].group
        - .spec.rules[].backendRefs[].kind
        - .spec.rules[].backendRefs[].weight
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
        - .metadata.generation
        - .metadata.finalizers
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.data[].remoteRef.nullBytePolicy
        - .spec.target.deletionPolicy
      - group: ""
        kind: PersistentVolumeClaim
        jqPathExpressions:
        - .spec.dataSourceRef
        - .spec.dataSource
        - .spec.volumeName
        - .spec.resources.requests.storage
      info:
      - name: 'Description'
        value: 'Monitoring component: {{path.basename}}'
