apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: my-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  generators:
  - git:
      repoURL: https://github.com/pboyd-oss/talos-argocd-proxmox.git
      revision: main
      directories:
      - path: my-apps/*/*
      - path: my-apps/home/project-nomad/*
        exclude: true
  template:
    metadata:
      name: 'my-apps-{{path.basename}}'
      annotations:
        argocd.argoproj.io/manifest-generate-paths: '{{path}}'
        argocd.argoproj.io/sync-wave: "6"
    spec:
      project: my-apps
      revisionHistoryLimit: 3
      source:
        repoURL: https://github.com/pboyd-oss/talos-argocd-proxmox.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
        - Replace=false
        retry:
          limit: -1  # Infinite retries — apps must never permanently die during bootstrap
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m
      ignoreDifferences:
      # NOTE: .status ignored globally by ArgoCD 3.0+ — only non-status fields listed
      - group: gateway.networking.k8s.io
        kind: HTTPRoute
        jqPathExpressions:
        - .spec.rules[].backendRefs[].group
        - .spec.rules[].backendRefs[].kind
        - .spec.rules[].backendRefs[].weight
      # imagePullPolicy may differ from Git due to previous Kyverno admission mutation
      - group: apps
        kind: StatefulSet
        jqPathExpressions:
        - .spec.template.spec.containers[].imagePullPolicy
        - .spec.template.spec.initContainers[].imagePullPolicy
        - .spec.volumeClaimTemplates[].apiVersion
        - .spec.volumeClaimTemplates[].kind
      # PVC fields that are immutable after creation - needed for Volume Populator
      - group: ""
        kind: PersistentVolumeClaim
        jqPathExpressions:
        - .spec.dataSourceRef
        - .spec.dataSource
        - .spec.volumeName
        - .spec.resources.requests.storage
      # Jenkins operator adds defaulted fields on every reconcile causing churn
      - group: jenkins.io
        kind: Jenkins
        jqPathExpressions:
        - .spec.seedJobAgentImage
        - .spec.backup
        - .spec.restore
        - .spec.service
        - .spec.slaveService
        - .spec.serviceAccount
        - .spec.master.plugins
        - .spec.master.terminationGracePeriodSeconds
        - .spec.master.containers
        - .spec.seedJobs

      info:
      - name: 'Description'
        value: 'Application: {{path.basename}}'
