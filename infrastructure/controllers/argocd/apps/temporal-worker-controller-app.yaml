# Temporal Worker Controller — standalone Application (not via AppSet).
# See keda-app.yaml for the rationale (AppSet revert loop during bootstrap).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: temporal-worker-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app.kubernetes.io/part-of: infrastructure
spec:
  project: infrastructure
  revisionHistoryLimit: 3
  source:
    repoURL: https://github.com/pboyd-oss/talos-argocd-proxmox.git
    targetRevision: main
    path: infrastructure/controllers/temporal-worker-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: temporal-worker-controller
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - Replace=false
    retry:
      limit: -1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 10m
