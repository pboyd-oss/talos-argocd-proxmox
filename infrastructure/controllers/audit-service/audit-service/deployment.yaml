apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-audit-service
  namespace: platform
  labels:
    app: platform-audit-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: platform-audit-service
  template:
    metadata:
      labels:
        app: platform-audit-service
    spec:
      serviceAccountName: platform-audit-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 65534
      containers:
        - name: audit-service
          image: harbor.tuxgrid.com/platform/audit-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATA_DIR
              value: /data/builds
            - name: ALERTMANAGER_URL
              value: "http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093"
          volumeMounts:
            - name: data
              mountPath: /data/builds
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: audit-service-data
