apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kyverno
resources:
- namespace.yaml
- rbac-patch.yaml
- policies/longhorn-pvc-backup-audit.yaml
- policies/require-signed-images.yaml
- policies/require-signed-platform-images.yaml
- policies/restrict-platform-image-registries.yaml
- policies/protect-cedar-policies.yaml
helmCharts:
- name: kyverno
  repo: https://kyverno.github.io/kyverno
  version: 3.8.0
  releaseName: kyverno
  namespace: kyverno
  valuesFile: values.yaml

patches:
- target:
    group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    name: clusterpolicies.kyverno.io
  patch: |-
    - op: replace
      path: /metadata/annotations
      value:
        argocd.argoproj.io/sync-options: Prune=false
- target:
    group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    name: policies.kyverno.io
  patch: |-
    - op: replace
      path: /metadata/annotations
      value:
        argocd.argoproj.io/sync-options: Prune=false
