---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: volsync-pvc-backup-restore
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    policies.kyverno.io/title: VolSync PVC Backup (Kopia NFS)
    policies.kyverno.io/description: >-
      Automatically generates VolSync backup resources for PVCs with the label
      backup: "hourly" or backup: "daily". Uses Kopia with NFS filesystem backend.
      Generates kopia Secret, ReplicationSource, and ReplicationDestination on PVC
      creation. Restore-on-create (dataSourceRef injection) must be done manually.
spec:
  mutateExistingOnPolicyUpdate: false
  background: false
  emitWarning: false
  validationFailureAction: Enforce
  rules:
    # Rule 1: Generate Secret for Kopia repository credentials
    # Reads credentials from volsync-kopia-template in volsync-system (SealedSecret).
    - name: generate-kopia-secret
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: ["hourly", "daily"]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - volsync-system
                - kyverno
      context:
        - name: kopiaCreds
          apiCall:
            urlPath: "/api/v1/namespaces/volsync-system/secrets/volsync-kopia-template"
            jmesPath: "data"
      generate:
        synchronize: false
        apiVersion: v1
        kind: Secret
        name: "volsync-{{request.object.metadata.name}}"
        namespace: "{{request.object.metadata.namespace}}"
        data:
          metadata:
            labels:
              app.kubernetes.io/managed-by: kyverno
              volsync.backup/pvc: "{{request.object.metadata.name}}"
          data:
            KOPIA_PASSWORD: "{{kopiaCreds.KOPIA_PASSWORD}}"
            KOPIA_REPOSITORY: "{{kopiaCreds.KOPIA_REPOSITORY}}"
            KOPIA_FS_PATH: "{{kopiaCreds.KOPIA_FS_PATH}}"

    # Rule 3: Generate ReplicationSource (backup schedule)
    # IMPORTANT: Only create backup AFTER PVC is Bound to avoid conflicts with restore
    - name: generate-replication-source
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: ["hourly", "daily"]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - volsync-system
                - kyverno
      preconditions:
        all:
          # Only create backup ReplicationSource after PVC is Bound
          # This prevents backup from running during restore (when PVC is Pending)
          - key: "{{ request.object.status.phase || 'Pending' }}"
            operator: Equals
            value: "Bound"
          # Don't create backup until PVC is at least 2 hours old
          # This prevents backing up empty data right after restore
          - key: "{{ time_since('', '{{request.object.metadata.creationTimestamp}}', '') }}"
            operator: GreaterThanOrEquals
            value: "2h"
      generate:
        synchronize: false
        apiVersion: volsync.backube/v1alpha1
        kind: ReplicationSource
        name: "{{request.object.metadata.name}}-backup"
        namespace: "{{request.object.metadata.namespace}}"
        data:
          metadata:
            labels:
              app.kubernetes.io/managed-by: kyverno
              volsync.backup/pvc: "{{request.object.metadata.name}}"
          spec:
            sourcePVC: "{{request.object.metadata.name}}"
            trigger:
              # Length-based deterministic spread across the minute field
              # (TEMPORARY — not a real hash). Better than every PVC firing
              # at :00, but PVC names share length ranges so this clusters.
              # Replace with a sha256-derived minute (or controller-driven
              # schedule) when inventory grows past ~50 backup-labeled PVCs.
              # - hourly:  "<minute> * * * *"
              # - daily:   "<minute> 2 * * *"
              schedule: "{{ to_string(modulo(length(join('-', [request.object.metadata.namespace, request.object.metadata.name])), `60`)) }} {{ request.object.metadata.labels.backup == 'hourly' && '* * * *' || '2 * * *' }}"
            kopia:
              repository: "volsync-{{request.object.metadata.name}}"
              compression: zstd-fastest
              parallelism: 2
              retain:
                hourly: 24
                daily: 7
                weekly: 4
                monthly: 2
              copyMethod: Snapshot
              storageClassName: longhorn
              volumeSnapshotClassName: longhorn-snapclass
              cacheCapacity: "2Gi"
              moverSecurityContext:
                runAsUser: 568
                runAsGroup: 568
                fsGroup: 568

    # Rule 4: Generate ReplicationDestination (restore capability)
    - name: generate-replication-destination
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: ["hourly", "daily"]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - volsync-system
                - kyverno
      generate:
        synchronize: false
        apiVersion: volsync.backube/v1alpha1
        kind: ReplicationDestination
        name: "{{request.object.metadata.name}}-backup"
        namespace: "{{request.object.metadata.namespace}}"
        data:
          metadata:
            labels:
              app.kubernetes.io/managed-by: kyverno
              volsync.backup/pvc: "{{request.object.metadata.name}}"
          spec:
            trigger:
              manual: restore-once
            kopia:
              repository: "volsync-{{request.object.metadata.name}}"
              copyMethod: Snapshot
              storageClassName: longhorn
              volumeSnapshotClassName: longhorn-snapclass
              accessModes:
                - "{{ request.object.spec.accessModes[0] || 'ReadWriteOnce' }}"
              capacity: "{{ request.object.spec.resources.requests.storage }}"
              cacheCapacity: "2Gi"
              moverSecurityContext:
                runAsUser: 568
                runAsGroup: 568
                fsGroup: 568
