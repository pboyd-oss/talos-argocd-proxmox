---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: volsync-pvc-backup-restore
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    policies.kyverno.io/title: VolSync PVC Backup and Restore (Kopia NFS)
    policies.kyverno.io/description: >-
      Automatically configures VolSync backup and restore for PVCs with the
      label backup: "hourly" or backup: "daily". Uses Kopia with NFS filesystem
      backend for faster backups with compression. MutatingAdmissionPolicy injects
      NFS mount into mover pods.
spec:
  mutateExistingOnPolicyUpdate: false
  background: false
  emitWarning: false
  validationFailureAction: Enforce
  rules:
    # Rule 1: Gate PVC creation on authoritative per-PVC backup truth.
    # This single rule covers BOTH plumber-availability and per-PVC backup
    # truth: when pvc-plumber is unreachable the apiCall on /exists below
    # returns the configured `default` (decision=unknown, authoritative=false)
    # which trips the deny block. The previous separate /readyz probe rule
    # was redundant and added a second serial HTTP call to the admission
    # path — under DR-storm load that risked a 10s webhook timeout.
    # If the repository lookup is unknown/error, DENY PVC creation. A false
    # negative here can let apps initialize empty state over restorable data.
    - name: require-authoritative-backup-decision
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              operations:
                - CREATE
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: ["hourly", "daily"]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - volsync-system
                - kyverno
      preconditions:
        all:
          # Escape hatch: if the PVC explicitly opts out of restore-on-create,
          # do not require an authoritative decision from pvc-plumber. This
          # lets you "nuke and start fresh" on a labeled PVC without having
          # to clear the kopia repo first. Backup generation rules below
          # still fire, so the new fresh PVC gets backed up going forward.
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || 'false' }}"
            operator: NotEquals
            value: "true"
      context:
        - name: backupCheck
          apiCall:
            method: GET
            default:
              exists: false
              decision: unknown
              authoritative: false
              error: pvc-plumber lookup failed
            service:
              url: "http://pvc-plumber.volsync-system.svc.cluster.local/exists/{{request.object.metadata.namespace}}/{{request.object.metadata.name}}"
      validate:
        failureAction: Enforce
        allowExistingViolations: true
        message: >-
          PVC Plumber could not make an authoritative restore/fresh decision
          for this backup-labeled PVC. PVC creation is denied to prevent silent
          empty-volume initialization when backup state is unknown.
        deny:
          conditions:
            any:
              - key: "{{ backupCheck.authoritative || false }}"
                operator: Equals
                value: false
              - key: "{{ backupCheck.decision || 'unknown' }}"
                operator: Equals
                value: "unknown"
              - key: "{{ backupCheck.error || '' }}"
                operator: NotEquals
                value: ""

    # Rule 2: Conditionally add dataSourceRef if backup exists in Kopia
    # IMPORTANT: Only trigger on CREATE to avoid race conditions during PVC deletion
    - name: add-datasource-if-backup-exists
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              operations:
                - CREATE
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: ["hourly", "daily"]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - volsync-system
                - kyverno
      context:
        - name: backupCheck
          apiCall:
            method: GET
            default:
              exists: false
              decision: unknown
              authoritative: false
              error: pvc-plumber lookup failed
            service:
              url: "http://pvc-plumber.volsync-system.svc.cluster.local/exists/{{request.object.metadata.namespace}}/{{request.object.metadata.name}}"
      preconditions:
        all:
          # Escape hatch: opt out of restore-on-create when nuking an app.
          # Pair with the matching precondition in rule 1 above.
          - key: "{{ request.object.metadata.annotations.\"volsync.backup/skip-restore\" || 'false' }}"
            operator: NotEquals
            value: "true"
          - key: "{{ backupCheck.authoritative || false }}"
            operator: Equals
            value: true
          - key: "{{ backupCheck.decision || 'unknown' }}"
            operator: Equals
            value: "restore"
          - key: "{{ backupCheck.exists || false }}"
            operator: Equals
            value: true
          - key: "{{ request.object.spec.dataSourceRef || '' }}"
            operator: Equals
            value: ""
      mutate:
        patchStrategicMerge:
          spec:
            dataSourceRef:
              apiGroup: volsync.backube
              kind: ReplicationDestination
              name: "{{request.object.metadata.name}}-backup"

    # Rule 2: Generate ExternalSecret for Kopia repository credentials
    - name: generate-kopia-secret
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: ["hourly", "daily"]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - volsync-system
                - kyverno
      generate:
        synchronize: false
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        name: "volsync-{{request.object.metadata.name}}"
        namespace: "{{request.object.metadata.namespace}}"
        data:
          metadata:
            labels:
              app.kubernetes.io/managed-by: kyverno
              volsync.backup/pvc: "{{request.object.metadata.name}}"
          spec:
            refreshInterval: 1h
            secretStoreRef:
              kind: ClusterSecretStore
              name: 1password
            target:
              name: "volsync-{{request.object.metadata.name}}"
              creationPolicy: Owner
              template:
                engineVersion: v2
                mergePolicy: Merge
                metadata:
                  labels:
                    app.kubernetes.io/managed-by: kyverno
                    volsync.backup/pvc: "{{request.object.metadata.name}}"
                data:
                  # Kopia NFS filesystem repository configuration
                  # MutatingAdmissionPolicy injects NFS mount at /repository
                  KOPIA_REPOSITORY: "filesystem:///repository"
                  KOPIA_FS_PATH: "/repository"
            data:
              - secretKey: KOPIA_PASSWORD
                remoteRef:
                  key: rustfs
                  property: kopia_password

    # Rule 3: Generate ReplicationSource (backup schedule)
    # IMPORTANT: Only create backup AFTER PVC is Bound to avoid conflicts with restore
    - name: generate-replication-source
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: ["hourly", "daily"]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - volsync-system
                - kyverno
      preconditions:
        all:
          # Only create backup ReplicationSource after PVC is Bound
          # This prevents backup from running during restore (when PVC is Pending)
          - key: "{{ request.object.status.phase || 'Pending' }}"
            operator: Equals
            value: "Bound"
          # Don't create backup until PVC is at least 2 hours old
          # This prevents backing up empty data right after restore
          - key: "{{ time_since('', '{{request.object.metadata.creationTimestamp}}', '') }}"
            operator: GreaterThanOrEquals
            value: "2h"
      generate:
        synchronize: false
        apiVersion: volsync.backube/v1alpha1
        kind: ReplicationSource
        name: "{{request.object.metadata.name}}-backup"
        namespace: "{{request.object.metadata.namespace}}"
        data:
          metadata:
            labels:
              app.kubernetes.io/managed-by: kyverno
              volsync.backup/pvc: "{{request.object.metadata.name}}"
          spec:
            sourcePVC: "{{request.object.metadata.name}}"
            trigger:
              # Length-based deterministic spread across the minute field
              # (TEMPORARY — not a real hash). Better than every PVC firing
              # at :00, but PVC names share length ranges so this clusters.
              # Replace with a sha256-derived minute (or controller-driven
              # schedule) when inventory grows past ~50 backup-labeled PVCs.
              # - hourly:  "<minute> * * * *"
              # - daily:   "<minute> 2 * * *"
              schedule: "{{ to_string(modulo(length(join('-', [request.object.metadata.namespace, request.object.metadata.name])), `60`)) }} {{ request.object.metadata.labels.backup == 'hourly' && '* * * *' || '2 * * *' }}"
            kopia:
              repository: "volsync-{{request.object.metadata.name}}"
              compression: zstd-fastest
              parallelism: 2
              retain:
                hourly: 24
                daily: 7
                weekly: 4
                monthly: 2
              copyMethod: Snapshot
              storageClassName: longhorn
              volumeSnapshotClassName: longhorn-snapclass
              cacheCapacity: "2Gi"
              moverSecurityContext:
                runAsUser: 568
                runAsGroup: 568
                fsGroup: 568

    # Rule 4: Generate ReplicationDestination (restore capability)
    - name: generate-replication-destination
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
              selector:
                matchExpressions:
                  - key: backup
                    operator: In
                    values: ["hourly", "daily"]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - volsync-system
                - kyverno
      generate:
        synchronize: false
        apiVersion: volsync.backube/v1alpha1
        kind: ReplicationDestination
        name: "{{request.object.metadata.name}}-backup"
        namespace: "{{request.object.metadata.namespace}}"
        data:
          metadata:
            labels:
              app.kubernetes.io/managed-by: kyverno
              volsync.backup/pvc: "{{request.object.metadata.name}}"
          spec:
            trigger:
              manual: restore-once
            kopia:
              repository: "volsync-{{request.object.metadata.name}}"
              copyMethod: Snapshot
              storageClassName: longhorn
              volumeSnapshotClassName: longhorn-snapclass
              accessModes:
                - "{{ request.object.spec.accessModes[0] || 'ReadWriteOnce' }}"
              capacity: "{{ request.object.spec.resources.requests.storage }}"
              cacheCapacity: "2Gi"
              moverSecurityContext:
                runAsUser: 568
                runAsGroup: 568
                fsGroup: 568
