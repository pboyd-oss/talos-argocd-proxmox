---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: longhorn-pvc-backup-audit
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    policies.kyverno.io/title: Audit Longhorn PVC backup intent
    policies.kyverno.io/description: >-
      Audit-only. Surfaces Longhorn PVCs that declare neither
      'backup' (hourly|daily) nor 'backup-exempt: "true"' so that backup
      intent is explicit per PVC. Never blocks admission; emits
      PolicyReport entries via 'kubectl get policyreport'. Background
      scan is enabled so existing PVCs are flagged on the next
      ~30s evaluation cycle, not just future creates.
spec:
  mutateExistingOnPolicyUpdate: false
  background: true
  emitWarning: false
  validationFailureAction: Audit
  rules:
    - name: require-backup-or-exempt-label
      skipBackgroundRequests: false
      match:
        any:
          - resources:
              kinds:
                - PersistentVolumeClaim
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - volsync-system
                - kyverno
                - longhorn-system
                - argocd
                - cert-manager
                - external-secrets
                - 1passwordconnect
                - snapshot-controller
                - cloudnative-pg
                - prometheus-stack
                - loki-stack
          - resources:
              names:
                - "volsync-*"
      validate:
        failureAction: Audit
        allowExistingViolations: true
        message: >-
          Longhorn PVC declares neither 'backup' (hourly|daily) nor
          'backup-exempt: "true"'. Set one explicitly to make backup
          intent clear. Pattern-based check works in both admission and
          background scan.
        # Pass if any of the patterns match. Each pattern is split out
        # so we don't depend on Kyverno's string-OR ("hourly | daily")
        # behavior inside a pattern value — fewer moving parts.
        # Caveat: =(storageClassName): "!longhorn" passes when the field
        # is absent, which means a Longhorn-default-storageclass PVC
        # without an explicit field would slip through. This cluster has
        # 2 such PVCs today and both are NFS-backed (correctly not
        # Longhorn), so the gap is benign in practice. If a Longhorn PVC
        # ever ships without an explicit storageClassName, add a
        # preconditions check on .status.storageClassName or fall back
        # to admission-only auditing.
        anyPattern:
          - spec:
              =(storageClassName): "!longhorn"
          - metadata:
              labels:
                backup: "hourly"
          - metadata:
              labels:
                backup: "daily"
          - metadata:
              labels:
                backup-exempt: "true"
