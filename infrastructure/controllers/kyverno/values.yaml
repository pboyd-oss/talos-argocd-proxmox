# Webhook namespace exclusions — infrastructure namespaces (Waves 0-2) must boot
# before Kyverno (Wave 3). Without this, a Kyverno crash-loop causes a full cluster
# deadlock because failurePolicy:Fail blocks all Deployment/StatefulSet/DaemonSet
# operations in non-excluded namespaces. The fail-closed PVC gate still protects
# app namespaces (Waves 4-6).
# RCA: 2026-04-08 full cluster outage caused by this exact deadlock.
config:
  webhooks:
    namespaceSelector:
      matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
          - kube-system
          - longhorn-system
          - argocd
          - volsync-system
          - snapshot-controller
          - cert-manager
  excludeKyvernoNamespace: true

admissionController:
  replicas: 3
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: admission-controller
          app.kubernetes.io/instance: kyverno
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: gpu-worker
              operator: DoesNotExist
  container:
    extraArgs:
      #  Override the default service account names - Helm uses Release.Namespace
      # which resolves to 'argocd' when deployed via ArgoCD, but resources are in 'kyverno'
      backgroundServiceAccountName: "system:serviceaccount:kyverno:kyverno-background-controller"
      reportsServiceAccountName: "system:serviceaccount:kyverno:kyverno-reports-controller"
    resources:
      limits:
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 512Mi
  rbac:
    clusterRole:
      extraResources:
      - apiGroups:
        - volsync.backube
        resources:
        - replicationsources
        - replicationdestinations
        verbs:
        - create
        - delete
        - get
        - list
        - patch
        - update
        - watch
      - apiGroups:
        - autoscaling.k8s.io
        resources:
        - verticalpodautoscalers
        verbs:
        - create
        - delete
        - get
        - list
        - patch
        - update
        - watch

backgroundController:
  replicas: 1
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 2500m
      memory: 192Mi
  rbac:
    clusterRole:
      extraResources:
      - apiGroups:
        - volsync.backube
        resources:
        - replicationsources
        - replicationdestinations
        verbs:
        - create
        - delete
        - get
        - list
        - patch
        - update
        - watch
      - apiGroups:
        - autoscaling.k8s.io
        resources:
        - verticalpodautoscalers
        verbs:
        - create
        - delete
        - get
        - list
        - patch
        - update
        - watch

cleanupController:
  replicas: 1
  resources:
    limits:
      memory: 384Mi
    requests:
      cpu: 100m
      memory: 192Mi
  rbac:
    clusterRole:
      extraResources:
      - apiGroups:
        - ""
        resources:
        - persistentvolumeclaims
        verbs:
        - get
        - list
        - watch
      - apiGroups:
        - volsync.backube
        resources:
        - replicationsources
        - replicationdestinations
        verbs:
        - get
        - list
        - watch
        - delete

reportsController:
  replicas: 1
  resources:
    limits:
      memory: 384Mi
    requests:
      cpu: 100m
      memory: 192Mi

# Fix kubectl image for cleanup hooks (bitnami/kubectl:1.30.2 doesn't exist)
policyReportsCleanup:
  image:
    registry: registry.k8s.io
    repository: kubectl
    tag: 'v1.36.0'

webhooksCleanup:
  image:
    registry: registry.k8s.io
    repository: kubectl
    tag: 'v1.36.0'
