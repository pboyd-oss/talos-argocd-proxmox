apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-token-service
  namespace: platform
  labels:
    app: platform-token-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-token-service
  template:
    metadata:
      labels:
        app: platform-token-service
        role: platform-token-service
    spec:
      serviceAccountName: platform-token-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: token-service
          image: harbor.tuxgrid.com/platform/token-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: JENKINS_JWKS_URL
              value: "http://jenkins-operator-http-jenkins.jenkins.svc.cluster.local:8080/oidc/jwks"
            - name: JENKINS_URL
              value: "http://jenkins-operator-http-jenkins.jenkins.svc.cluster.local:8080"
            - name: JENKINS_API_USER
              value: "token-service"
            - name: JENKINS_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: token-service-jenkins-creds
                  key: api-token
            - name: COSIGN_PUBLIC_KEY_PATH
              value: "/cosign/cosign.pub"
            - name: ROLES_CONFIG_DIR
              value: "/roles"
          volumeMounts:
            - name: cosign-pub
              mountPath: /cosign
              readOnly: true
            - name: authorized-roles
              mountPath: /roles
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: cosign-pub
          secret:
            secretName: cosign-public-key
        - name: authorized-roles
          configMap:
            name: authorized-deploy-roles
