apiVersion: v1
kind: ConfigMap
metadata:
  name: authorized-deploy-roles
  namespace: platform
# Platform-controlled mapping of team → environment → IAM role ARN.
# Teams cannot edit this. To add or change a team's authorized deployment targets,
# update this file via a platform GitOps PR — it is the authoritative source of
# which teams may deploy to which AWS accounts.
data:
  team-a.yaml: |
    environments:
      staging:
        role_arn: arn:aws:iam::999999999999:role/platform-deploy-team-a-staging
        account_id: "999999999999"
        session_policy: |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": ["s3:PutObject", "s3:GetObject", "s3:DeleteObject"],
                "Resource": "arn:aws:s3:::team-a-staging-*"
              },
              {
                "Effect": "Allow",
                "Action": ["lambda:UpdateFunctionCode", "lambda:GetFunction"],
                "Resource": "arn:aws:lambda:*:999999999999:function:team-a-*"
              }
            ]
          }
      production-us:
        role_arn: arn:aws:iam::123456789012:role/platform-deploy-team-a-prod
        account_id: "123456789012"
        session_policy: |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": ["s3:PutObject", "s3:GetObject"],
                "Resource": "arn:aws:s3:::team-a-production-us-*"
              },
              {
                "Effect": "Allow",
                "Action": ["lambda:UpdateFunctionCode"],
                "Resource": "arn:aws:lambda:*:123456789012:function:team-a-*"
              }
            ]
          }
  team-b.yaml: |
    environments:
      staging:
        role_arn: arn:aws:iam::999999999999:role/platform-deploy-team-b-staging
        account_id: "999999999999"
        session_policy: |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": ["ecs:UpdateService", "ecs:DescribeServices"],
                "Resource": "arn:aws:ecs:*:999999999999:service/team-b-*"
              }
            ]
          }
