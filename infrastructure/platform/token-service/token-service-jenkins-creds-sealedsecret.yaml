# Sealed Secret for the Jenkins API token used by the Token Service to call
# the Jenkins build API (building:true check for JWT replay prevention).
#
# The Jenkins side is automated: seed-token-service-user.groovy creates the
# token-service Jenkins user and seeds its API token from the token-service-token
# Secret in the jenkins namespace. See:
#   my-apps/development/jenkins-lab/token-service-token-sealedsecret.yaml
#
# BOTH secrets must be sealed from the same plaintext value. Generate it once:
#   TOKEN=$(openssl rand -hex 20)
#
# Then seal the platform-namespace secret (this file):
#   kubectl create secret generic token-service-jenkins-creds \
#     --namespace platform \
#     --from-literal=api-token="$TOKEN" \
#     --dry-run=client -o yaml \
#   | kubeseal --controller-namespace kube-system --controller-name sealed-secrets \
#     --format yaml > token-service-jenkins-creds-sealedsecret.yaml
#
# And seal the jenkins-namespace secret (see that file for its kubeseal command).
# Replace the PLACEHOLDER value below with the kubeseal output.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: token-service-jenkins-creds
  namespace: platform
spec:
  encryptedData:
    api-token: PLACEHOLDER__run_kubeseal_to_generate
  template:
    metadata:
      name: token-service-jenkins-creds
      namespace: platform
