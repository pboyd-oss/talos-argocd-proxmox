apiVersion: v1
kind: Namespace
metadata:
  name: platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-token-service
  namespace: platform
  annotations:
    # IRSA: this SA may only call sts:AssumeRole on platform-deploy-* roles.
    # Set to the actual role ARN for your cluster's OIDC provider.
    eks.amazonaws.com/role-arn: "arn:aws:iam::PLATFORM_ACCOUNT_ID:role/platform-token-service-irsa"
---
# ServiceAccount used by the platform-deployer Jenkins pod template.
# Also bound to IRSA — the Token Service's sts:AssumeRole grants credentials, not this SA directly.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-deployer
  namespace: jenkins
---
# Allows platform-token-service to call TokenReview to verify the projected SA
# token that the deployer pod presents on every /token request.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-token-service-token-review
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: platform-token-service
    namespace: platform
