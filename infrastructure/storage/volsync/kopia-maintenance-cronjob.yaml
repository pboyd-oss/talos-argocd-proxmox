# Kopia repository maintenance — consolidates index blobs, GCs unreachable content,
# and keeps repo metadata fast. Required because VolSync mover pods (ephemeral
# hostnames) can't consistently own maintenance — Kopia records owner identity
# in repo config and refuses maintenance from other identities. This CronJob
# runs with a stable synthetic identity ("maintenance@cluster") and claims
# ownership idempotently on every run.
#
# Schedule: 03:37 daily (off the top of the hour to avoid generated hourly backups).
# Quick maintenance runs every day; Kopia internally schedules full maintenance
# weekly based on repo policy below.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kopia-maintenance
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: kopia-maintenance
    app.kubernetes.io/component: backup-maintenance
spec:
  # Daily at 03:37 UTC — intentionally off the top of the hour so it does not
  # start at the same minute as generated hourly VolSync backup jobs.
  schedule: "37 3 * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid         # Kopia maintenance holds a repo lock — no overlap
  startingDeadlineSeconds: 3600     # Skip run if missed by >1h (don't backfill forever)
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 7200   # Hard cap: 2h — full maintenance on large repos can take 30-60m
      template:
        metadata:
          labels:
            app.kubernetes.io/name: kopia-maintenance
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: kopia
            # Pin to a specific Kopia version so CI can bump via Renovate.
            # Must be compatible with VolSync mover's kopia version (VolSync 0.18.x ships kopia ~0.20).
            image: kopia/kopia:0.22.3
            imagePullPolicy: IfNotPresent
            env:
            - name: KOPIA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pvc-plumber-kopia     # reuse existing ExternalSecret
                  key: KOPIA_PASSWORD
            # Stable synthetic identity — independent of pod name / VolSync mover churn.
            # Kopia records "<username>@<hostname>" in repo config as maintenance owner.
            - name: KOPIA_OVERRIDE_USERNAME
              value: "maintenance"
            - name: KOPIA_OVERRIDE_HOSTNAME
              value: "cluster"
            - name: KOPIA_CONFIG_PATH
              value: "/tmp/kopia/repository.config"
            - name: KOPIA_LOG_DIR
              value: "/tmp/kopia/logs"
            - name: KOPIA_CACHE_DIRECTORY
              value: "/tmp/kopia/cache"
            - name: HOME
              value: "/tmp"
            # Kopia's static-build binary can't resolve the current user via NSS
            # (no CGO), so it falls back to $USER — must be set or kopia aborts
            # with "Cannot determine current user: user: Current requires cgo
            # or $USER set in environment"
            - name: USER
              value: "maintenance"
            # Go's user.Current() falls back to USER *or* LOGNAME when built
            # without cgo — set both for safety.
            - name: LOGNAME
              value: "maintenance"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                cpu: "2"
                # 4Gi: `kopia maintenance run --full` loads blob indexes
                # into memory. 2Gi was enough for small repos but the
                # Kopia NFS share is ~27Gi of blobs now and the job OOMed
                # silently before printing anything useful. 4Gi gives
                # headroom for future growth without being extravagant.
                memory: 4Gi
            command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "=== Connecting to Kopia repository ==="
              # Kopia 0.20 ignores the KOPIA_OVERRIDE_HOSTNAME env var —
              # only the `--override-hostname` flag on `repository connect`
              # actually sets the client identity. Without this, the pod
              # hostname (some generated string) is used, and then
              # `kopia maintenance run` errors out with:
              #   "maintenance must be run by designated user: maintenance@cluster"
              # because the owner stored on the repo (maintenance@cluster)
              # doesn't match the running client (maintenance@<pod-name>).
              kopia repository connect filesystem \
                --path=/repository \
                --password="$KOPIA_PASSWORD" \
                --override-hostname=cluster \
                --override-username=maintenance

              echo "=== Current maintenance policy ==="
              kopia maintenance info || true

              echo "=== Claiming ownership (idempotent) ==="
              # Safe: --owner matches our client identity (maintenance@cluster)
              # Kopia validates that --owner matches the running client's identity
              # before accepting the change. If another owner is already set,
              # this forces the switch on next run by whichever client asserts it.
              # Claim ownership with our synthetic identity. Kopia validates
              # that --owner matches the client's resolved identity
              # ($KOPIA_OVERRIDE_USERNAME@$KOPIA_OVERRIDE_HOSTNAME).
              kopia maintenance set \
                --owner="maintenance@cluster"

              # Schedule the internal maintenance cadences (flags are
              # --quick-interval / --full-interval, NOT --*-maintenance-interval).
              kopia maintenance set \
                --quick-interval=24h \
                --full-interval=168h

              echo "=== Running maintenance ==="
              # Kopia decides quick vs full internally based on the policy
              # above. Keep default safety for recurring GitOps maintenance:
              # unsafe GC belongs in a manual break-glass operation only.
              kopia maintenance run

              echo "=== Post-maintenance index blob count ==="
              kopia repository status --json | grep -i blob || true

              echo "=== Done ==="
            volumeMounts:
            - name: repository
              mountPath: /repository
            - name: kopia-tmp
              mountPath: /tmp/kopia
          volumes:
          - name: repository
            nfs:
              server: 192.168.100.2
              path: /mnt/BigTank/k8s/volsync-kopia-nfs
          - name: kopia-tmp
            emptyDir: {}
          # Avoid scheduling on GPU nodes — leave their CPU for inference work
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: gpu-worker
                        operator: DoesNotExist
