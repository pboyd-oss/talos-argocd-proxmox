# VolSync orphan reaper — bash CronJob workaround for a Kyverno cleanup bug.
#
# Background: the volsync-pvc-backup-restore Kyverno ClusterPolicy generates
# an ExternalSecret + ReplicationSource + ReplicationDestination per
# backup-labeled PVC. When the operator removes the `backup` label (or the
# value changes to something other than hourly|daily), those generated
# resources should be reaped automatically.
#
# We have a `volsync-orphan-cleanup` ClusterCleanupPolicy that's supposed to
# do exactly this on a 15-minute schedule, but it has been silently broken on
# both Kyverno 1.17.2 and 1.18.0. Drill #4 (2026-04-30 + 2026-05-01) confirmed
# 6+ consecutive ticks fired with `lastExecutionTime` updates and zero
# resources reaped. Suspected bug: `apiCall` context evaluation inside
# ClusterCleanupPolicy is non-functional. The simpler no-apiCall control
# policy worked, but we couldn't replicate the parent-PVC-label check
# without an apiCall.
#
# This CronJob does the same job in bash. It walks every kyverno-managed
# RS/RD/ES, fetches its parent PVC's `backup` label, and deletes the helper
# resource if the label is missing or set to something other than
# hourly|daily. Idempotent, debuggable.
#
# Remove this file once the Kyverno upstream bug is fixed and
# `volsync-orphan-cleanup` actually reaps on schedule.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: volsync-orphan-reaper
  namespace: volsync-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: volsync-orphan-reaper
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
  - apiGroups: ["volsync.backube"]
    resources: ["replicationsources", "replicationdestinations"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: volsync-orphan-reaper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: volsync-orphan-reaper
subjects:
  - kind: ServiceAccount
    name: volsync-orphan-reaper
    namespace: volsync-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: volsync-orphan-reaper
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: volsync-orphan-reaper
    app.kubernetes.io/component: cleanup
spec:
  # Match the broken Kyverno ClusterCleanupPolicy schedule so behavior is
  # identical from an operator perspective.
  schedule: "*/15 * * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: volsync-orphan-reaper
        spec:
          serviceAccountName: volsync-orphan-reaper
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          volumes:
            # Writable scratch for kubectl's discovery + http cache. With
            # readOnlyRootFilesystem=true, kubectl falls back to /tmp; we
            # mount an emptyDir there so cache writes don't fail or get
            # noisy. Also holds the per-run log file used to count reaps
            # across the pipe-driven subshell loop (POSIX sh has no clean
            # way to share variables out of `cmd | while; done`).
            - name: tmp
              emptyDir: {}
          containers:
            - name: reaper
              # alpine/k8s ships kubectl + a shell. The distroless
              # registry.k8s.io/kubectl image has no /bin/sh so
              # `command: [/bin/sh, -c, ...]` fails OCI runtime init.
              # Tag pinned conservatively — kubectl client version doesn't
              # need to match cluster version exactly for these basic ops.
              image: alpine/k8s:1.33.0
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              env:
                # kubectl's default cache lives at $HOME/.kube/cache; nudge
                # it to the writable emptyDir so the cache works.
                - name: HOME
                  value: /tmp
                - name: KUBECACHEDIR
                  value: /tmp/.kube/cache
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  echo "=== volsync-orphan-reaper $(date -u +%FT%TZ) ==="

                  # Tempfile-backed event log. The pipe pattern below
                  # (kubectl get ... | while read) runs the while loop in
                  # a subshell, which means inner counter variables aren't
                  # visible to the parent. POSIX sh has no clean way around
                  # that without either process substitution (bash-only) or
                  # an out-of-band channel like this log file.
                  LOG=$(mktemp /tmp/reaper-log.XXXXXX)
                  trap "rm -f \"$LOG\"" EXIT

                  for kind in replicationsource replicationdestination externalsecret; do
                    kubectl get "$kind" -A \
                      -l 'app.kubernetes.io/managed-by=kyverno,volsync.backup/pvc' \
                      -o jsonpath='{range .items[*]}{.metadata.namespace}|{.metadata.name}|{.metadata.labels.volsync\.backup/pvc}{"\n"}{end}' \
                    | while IFS='|' read -r ns name pvc; do
                        [ -z "$ns" ] && continue
                        label=$(kubectl get pvc -n "$ns" "$pvc" -o jsonpath='{.metadata.labels.backup}' 2>/dev/null || true)
                        if [ "$label" = "hourly" ] || [ "$label" = "daily" ]; then
                          continue
                        fi
                        # Re-check the parent label immediately before
                        # delete to close the rare race where an operator
                        # re-labels back to hourly|daily between our list
                        # call and our delete call.
                        recheck=$(kubectl get pvc -n "$ns" "$pvc" -o jsonpath='{.metadata.labels.backup}' 2>/dev/null || true)
                        if [ "$recheck" = "hourly" ] || [ "$recheck" = "daily" ]; then
                          echo "SKIP $kind $ns/$name (parent pvc=$pvc relabeled to '$recheck' mid-loop)" | tee -a "$LOG"
                          continue
                        fi
                        if kubectl delete "$kind" -n "$ns" "$name" --ignore-not-found=true --wait=false >/dev/null; then
                          echo "REAP $kind $ns/$name (parent pvc=$pvc backup-label='${label:-<missing>}')" | tee -a "$LOG"
                        else
                          echo "ERROR $kind $ns/$name (delete failed)" | tee -a "$LOG"
                        fi
                      done
                  done

                  REAPED=$(grep -c '^REAP ' "$LOG" 2>/dev/null || echo 0)
                  ERRORS=$(grep -c '^ERROR ' "$LOG" 2>/dev/null || echo 0)
                  SKIPPED=$(grep -c '^SKIP ' "$LOG" 2>/dev/null || echo 0)
                  echo "=== reaped=$REAPED errors=$ERRORS skipped=$SKIPPED ==="
                  # Non-zero exit on any delete failure so kube_job_status_failed
                  # alerts can fire (see VolSyncOrphanReaperFailed).
                  [ "$ERRORS" = "0" ]
