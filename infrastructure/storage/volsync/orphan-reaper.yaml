# VolSync orphan reaper — bash CronJob workaround for a Kyverno cleanup bug.
#
# Background: the volsync-pvc-backup-restore Kyverno ClusterPolicy generates
# an ExternalSecret + ReplicationSource + ReplicationDestination per
# backup-labeled PVC. When the operator removes the `backup` label (or the
# value changes to something other than hourly|daily), those generated
# resources should be reaped automatically.
#
# We have a `volsync-orphan-cleanup` ClusterCleanupPolicy that's supposed to
# do exactly this on a 15-minute schedule, but it has been silently broken on
# both Kyverno 1.17.2 and 1.18.0. Drill #4 (2026-04-30 + 2026-05-01) confirmed
# 6+ consecutive ticks fired with `lastExecutionTime` updates and zero
# resources reaped. Suspected bug: `apiCall` context evaluation inside
# ClusterCleanupPolicy is non-functional. The simpler no-apiCall control
# policy worked, but we couldn't replicate the parent-PVC-label check
# without an apiCall.
#
# This CronJob does the same job in bash. It walks every kyverno-managed
# RS/RD/ES, fetches its parent PVC's `backup` label, and deletes the helper
# resource if the label is missing or set to something other than
# hourly|daily. Idempotent, debuggable.
#
# Remove this file once the Kyverno upstream bug is fixed and
# `volsync-orphan-cleanup` actually reaps on schedule.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: volsync-orphan-reaper
  namespace: volsync-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: volsync-orphan-reaper
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
  - apiGroups: ["volsync.backube"]
    resources: ["replicationsources", "replicationdestinations"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: volsync-orphan-reaper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: volsync-orphan-reaper
subjects:
  - kind: ServiceAccount
    name: volsync-orphan-reaper
    namespace: volsync-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: volsync-orphan-reaper
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: volsync-orphan-reaper
    app.kubernetes.io/component: cleanup
spec:
  # Match the broken Kyverno ClusterCleanupPolicy schedule so behavior is
  # identical from an operator perspective.
  schedule: "*/15 * * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      # Auto-evaporate Job objects 1h after Complete or Failed. Without this,
      # `kube_job_status_failed` retains transient failures (held by
      # failedJobsHistoryLimit: 3) and the VolSyncOrphanReaperFailed alert
      # keeps firing well after a subsequent successful run. With TTL, every
      # Job is gone an hour after it terminated regardless of phase, so the
      # alert self-resolves and we don't need manual `kubectl delete job`
      # cleanup. Debug window is the 1h before TTL fires.
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: volsync-orphan-reaper
        spec:
          serviceAccountName: volsync-orphan-reaper
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: reaper
              # alpine/k8s ships kubectl + GNU bash + busybox sh. The
              # distroless registry.k8s.io/kubectl image has no shell at
              # all so `command: [/bin/sh, -c, ...]` would fail OCI runtime
              # init.
              #
              # IMAGE / SHELL DEPENDENCY (intentional; do not change without
              # retesting):
              #   - Image: alpine/k8s:1.33.0 — ships kubectl 1.33 + GNU bash
              #     at /bin/bash and busybox ash at /bin/sh.
              #   - Interpreter: /bin/bash. The script uses bash-only process
              #     substitution `done < <(cmd)` to run the while loop in
              #     the parent shell so REAPED/CHECKED counters propagate.
              #     POSIX sh has no clean equivalent; rewriting to a
              #     `cmd | while; done` pipe forces the while into a subshell
              #     and loses the counters, requiring tempfile gymnastics.
              #   - We tested this exact image+spec end-to-end and it reaps
              #     correctly. Drill #4 results doc has the trace.
              #   - If the image tag changes, or if a future maintainer drops
              #     bash from the image, switch back to /bin/sh and restructure
              #     the loop. Don't assume process substitution is portable.
              image: alpine/k8s:1.33.0
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              command:
                # Match the interpreter to the script (bash-only process
                # substitution below). See the shell-dependency note on
                # the image field above.
                - /bin/bash
                - -c
                - |
                  set -eu
                  echo "=== volsync-orphan-reaper $(date -u +%FT%TZ) ==="
                  REAPED=0
                  CHECKED=0
                  for kind in replicationsource replicationdestination externalsecret; do
                    # List every kyverno-managed instance of this kind that
                    # carries a volsync.backup/pvc label (the marker for
                    # "this resource was generated for a labeled PVC").
                    while IFS='|' read -r ns name pvc; do
                      [ -z "$ns" ] && continue
                      CHECKED=$((CHECKED + 1))
                      label=$(kubectl get pvc -n "$ns" "$pvc" -o jsonpath='{.metadata.labels.backup}' 2>/dev/null || true)
                      if [ "$label" != "hourly" ] && [ "$label" != "daily" ]; then
                        echo "REAP $kind $ns/$name (parent pvc=$pvc backup-label='${label:-<missing>}')"
                        kubectl delete "$kind" -n "$ns" "$name" --wait=false || true
                        REAPED=$((REAPED + 1))
                      fi
                    done < <(kubectl get "$kind" -A \
                      -l 'app.kubernetes.io/managed-by=kyverno,volsync.backup/pvc' \
                      -o jsonpath='{range .items[*]}{.metadata.namespace}|{.metadata.name}|{.metadata.labels.volsync\.backup/pvc}{"\n"}{end}')
                  done
                  echo "=== checked=$CHECKED reaped=$REAPED ==="
