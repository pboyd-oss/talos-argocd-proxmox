# CNPG bootstrap secret — lives in cloudnative-pg namespace.
# Cluster initdb uses this to create the 'registry' database owned by 'harbor'.
#
# Regenerate:
#   kubectl create secret generic harbor-app-secret \
#     --namespace cloudnative-pg \
#     --from-literal=username=harbor \
#     --from-literal=password=<PASSWORD> \
#     --dry-run=client -o yaml | \
#     kubeseal --format yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: harbor-app-secret
  namespace: cloudnative-pg
spec:
  encryptedData:
    username: 
    password: 
  template:
    metadata:
      name: harbor-app-secret
      namespace: cloudnative-pg
