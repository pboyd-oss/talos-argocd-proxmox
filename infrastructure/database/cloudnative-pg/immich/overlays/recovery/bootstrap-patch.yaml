apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-database
spec:
  bootstrap:
    recovery:
      source: immich-recovery-source
      database: immich
      owner: immich
      secret:
        name: immich-app-secret
      # No recoveryTarget → restore to latest-WAL available on S3.
      # See gitea/overlays/recovery/bootstrap-patch.yaml for rationale.
  externalClusters:
    - name: immich-recovery-source
      barmanObjectStore:
        # Prior lineage to restore from. Bump to N-1 at DR time.
        serverName: immich-database-v1
        destinationPath: s3://postgres-backups/cnpg/immich
        endpointURL: http://192.168.100.2:30293
        s3Credentials:
          accessKeyId:
            name: cnpg-s3-credentials
            key: AWS_ACCESS_KEY_ID
          secretAccessKey:
            name: cnpg-s3-credentials
            key: AWS_SECRET_ACCESS_KEY
        wal:
          compression: gzip
