# paperless CNPG database — root kustomization
#
# DR FEATURE FLAG — edit the active overlay to switch bootstrap mode.
# See gitea/kustomization.yaml for the full DR runbook comment.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cloudnative-pg
commonLabels:
  app.kubernetes.io/name: paperless-db
  app.kubernetes.io/managed-by: argocd
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-5"
resources:
  # - overlays/recovery      # swap to this for DR (restore from Barman)
  - overlays/initdb          # ← ACTIVE: fresh DB / normal operation
  - sealedsecret.yaml
  - scheduled-backup.yaml
