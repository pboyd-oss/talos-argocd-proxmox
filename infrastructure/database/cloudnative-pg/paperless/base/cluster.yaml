# Base CNPG Cluster manifest — NO bootstrap stanza. See gitea/base/cluster.yaml
# for serverName bump rationale.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperless-database
  labels:
    app: paperless-ngx
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
  postgresql:
    parameters:
      shared_buffers: "256MB"
      max_wal_size: "1GB"
      wal_compression: "on"
      logging_collector: "on"
      log_statement: "ddl"
    pg_hba:
      - host all all 0.0.0.0/0 md5
  storage:
    size: 50Gi
    storageClass: longhorn
  walStorage:
    size: 50Gi
    storageClass: longhorn
  managed:
    services:
      additional:
        - selectorType: rw
          updateStrategy: patch
          serviceTemplate:
            metadata:
              name: paperless-postgres-external
              annotations:
                lbipam.cilium.io/ips: "192.168.100.42"
            spec:
              type: LoadBalancer
              ports:
                - name: postgres
                  port: 5432
                  targetPort: 5432
                  protocol: TCP
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: true
  backup:
    barmanObjectStore:
      # Write target. Clean-slate baseline after 2026-04-19 RustFS wipe.
      serverName: paperless-database-v1
      destinationPath: s3://postgres-backups/cnpg/paperless
      endpointURL: http://192.168.100.2:30293
      s3Credentials:
        accessKeyId:
          name: cnpg-s3-credentials
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-s3-credentials
          key: AWS_SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "14d"
