# External DB password — lives in harbor namespace for Harbor chart.
# Must contain the same password as harbor-app-secret in cloudnative-pg namespace.
#
# Regenerate:
#   kubectl create secret generic harbor-database-secret \
#     --namespace harbor \
#     --from-literal=HARBOR_DATABASE_PASSWORD=<SAME_PASSWORD_AS_harbor-app-secret> \
#     --dry-run=client -o yaml | \
#     kubeseal --format yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: harbor-database-secret
  namespace: harbor
spec:
  encryptedData:
    HARBOR_DATABASE_PASSWORD: REPLACE_ME
  template:
    metadata:
      name: harbor-database-secret
      namespace: harbor
