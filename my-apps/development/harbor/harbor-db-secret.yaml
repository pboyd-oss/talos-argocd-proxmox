# External DB password — lives in harbor namespace for Harbor chart.
# Must contain the same password as harbor-app-secret in cloudnative-pg namespace.
# Key must be 'password' — Harbor chart external DB config reads this key.
#
# Regenerate:
#   kubectl create secret generic harbor-database-secret \
#     --namespace harbor \
#     --from-literal=password=<SAME_PASSWORD_AS_harbor-app-secret> \
#     --dry-run=client -o yaml | \
#     kubeseal --controller-name=sealed-secrets --controller-namespace=sealed-secrets --format yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: harbor-database-secret
  namespace: harbor
spec:
  encryptedData:
    password: 
  template:
    metadata:
      name: harbor-database-secret
      namespace: harbor
