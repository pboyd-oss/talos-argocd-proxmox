apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: harbor

resources:
  - namespace.yaml
  - httproute.yaml
  - pvc-registry.yaml
  - sealedsecret.yaml
  - harbor-db-secret.yaml

helmCharts:
  - name: harbor
    repo: https://helm.goharbor.io
    version: 1.18.3
    releaseName: harbor
    namespace: harbor
    valuesFile: values.yaml

patches:
  # Harbor deployments use RWO PVCs — RollingUpdate causes Multi-Attach deadlock
  - patch: |
      - op: replace
        path: /spec/strategy
        value:
          type: Recreate
    target:
      kind: Deployment
      namespace: harbor
  # Chart 1.18.3 hardcodes timeoutSeconds: 1, failureThreshold: 2 for core probes,
  # which kills the pod on any brief slowness (e.g. jobservice not yet ready at startup).
  - patch: |
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/timeoutSeconds
        value: 5
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/failureThreshold
        value: 5
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/timeoutSeconds
        value: 5
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/failureThreshold
        value: 5
    target:
      kind: Deployment
      name: harbor-core
      namespace: harbor
  # harbor-nginx has a 1s liveness/readiness timeout that fires during large blob downloads,
  # causing restart loops that drop active kaniko pull connections (EOF mid-transfer).
  - patch: |
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/timeoutSeconds
        value: 10
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/failureThreshold
        value: 5
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/timeoutSeconds
        value: 10
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/failureThreshold
        value: 5
    target:
      kind: Deployment
      name: harbor-nginx
      namespace: harbor
