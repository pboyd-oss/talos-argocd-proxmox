expose:
  type: clusterIP
  tls:
    enabled: false
    certSource: none
  clusterIP:
    name: harbor-nginx
    ports:
      httpPort: 80
      httpsPort: 443

# TLS is terminated at gateway-internal; Harbor itself speaks plain HTTP internally.
externalURL: https://harbor.tuxgrid.com

existingSecretAdminPassword: harbor-admin
existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD

persistence:
  enabled: true
  resourcePolicy: "keep"
  persistentVolumeClaim:
    registry:
      existingClaim: harbor-registry
      accessMode: ReadWriteOnce
    jobservice:
      jobLog:
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 5Gi
    redis:
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 1Gi
    trivy:
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 5Gi

database:
  type: external
  external:
    host: "harbor-database-rw.cloudnative-pg.svc.cluster.local"
    port: "5432"
    username: "harbor"
    coreDatabase: "registry"
    existingSecret: "harbor-database-secret"
    sslmode: "disable"

redis:
  type: internal

trivy:
  enabled: true

core:
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 1000m

portal:
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m

registry:
  registry:
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m
  controller:
    resources:
      requests:
        memory: 128Mi
        cpu: 50m
      limits:
        memory: 256Mi
        cpu: 250m

jobservice:
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m
