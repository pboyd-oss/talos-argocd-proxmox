apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-data-clickhouse-0
  namespace: posthog
  labels:
    app: posthog-clickhouse
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: clickhouse
    backup: "daily"
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 100Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: clickhouse
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: posthog
      app.kubernetes.io/component: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: posthog
        app.kubernetes.io/component: clickhouse
    spec:
      containers:
      - name: clickhouse
        image: clickhouse/clickhouse-server:25.12.8.9
        imagePullPolicy: IfNotPresent
        env:
        - name: CLICKHOUSE_SKIP_USER_SETUP
          value: "1"
        - name: KAFKA_HOSTS
          value: "kafka:9092"
        ports:
        - containerPort: 8123
          name: http
        - containerPort: 9000
          name: tcp
        - containerPort: 9181
          name: keeper
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 500m
            memory: 8Gi
          limits:
            memory: 16Gi
        volumeMounts:
        - name: clickhouse-data
          mountPath: /var/lib/clickhouse
        - name: config
          mountPath: /etc/clickhouse-server/config.xml
          subPath: config.xml
        - name: config
          mountPath: /etc/clickhouse-server/users.xml
          subPath: users.xml
        - name: config
          mountPath: /etc/clickhouse-server/user_defined_function.xml
          subPath: user_defined_function.xml
        - name: config-d-default
          mountPath: /etc/clickhouse-server/config.d/default.xml
          subPath: default.xml
        - name: config-d-keeper
          mountPath: /etc/clickhouse-server/config.d/keeper.xml
          subPath: keeper.xml
        - name: init
          mountPath: /docker-entrypoint-initdb.d/init-posthog.sh
          subPath: init-posthog.sh
      volumes:
      - name: clickhouse-data
        persistentVolumeClaim:
          claimName: clickhouse-data-clickhouse-0
      - name: config
        configMap:
          name: clickhouse-config
      - name: config-d-default
        configMap:
          name: clickhouse-config-d
          items:
          - key: default.xml
            path: default.xml
      - name: config-d-keeper
        configMap:
          name: clickhouse-config-d
          items:
          - key: keeper.xml
            path: keeper.xml
      - name: init
        configMap:
          name: clickhouse-init
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: posthog
spec:
  ports:
  - port: 8123
    targetPort: 8123
    name: http
  - port: 9000
    targetPort: 9000
    name: tcp
  selector:
    app.kubernetes.io/name: posthog
    app.kubernetes.io/component: clickhouse
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: clickhouse-data-clickhouse-0-backup
  namespace: posthog
  labels:
    app.kubernetes.io/managed-by: kyverno
    volsync.backup/pvc: clickhouse-data-clickhouse-0
spec:
  sourcePVC: clickhouse-data-clickhouse-0
  trigger:
    schedule: "32 2 * * *"
  kopia:
    repository: volsync-clickhouse-data-clickhouse-0
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: longhorn
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
