apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: posthog

resources:
  - namespace.yaml
  - externalsecret.yaml
  - httproute.yaml
  # Data layer (all in posthog namespace)
  - data-layer/postgres.yaml
  - data-layer/redis.yaml
  - data-layer/kafka.yaml
  - config
  - data-layer/clickhouse.yaml
  # Core application
  - core/clickhouse-init.yaml
  - core/jobs.yaml
  - core/web.yaml
  - core/workers.yaml
  - core/plugins.yaml
  - core/capture.yaml
  - core/ingestion.yaml
  - core/ingestion-sessionreplay.yaml
  - core/recording-api.yaml
  - core/temporal-worker.yaml
  - core/microservices.yaml
  - core/toolbox.yaml

# Hash-suffixed env configmap. Consumed via envFrom by 11+ posthog
# workloads (web, capture, ingestion, recording-api, plugins, workers,
# temporal-worker, toolbox, jobs, etc.) — Kustomize rewrites every
# `configMapRef.name: posthog-env` to the hashed name, so any env edit
# rolls *all* of them automatically. (Previously, an env change required
# manually `kubectl rollout restart` on each Deployment.)
configMapGenerator:
  - name: posthog-env
    envs:
      - posthog-env.env
