apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: posthog-ui-internal
  namespace: posthog
spec:
  parentRefs:
    - name: gateway-internal
      namespace: gateway
      sectionName: https
  hostnames:
    - "posthog.tuxgrid.com"
  rules:
    # Event capture (Rust) - high throughput, must hit dedicated service
    - matches:
        - path:
            type: PathPrefix
            value: /e
        - path:
            type: PathPrefix
            value: /i/v0
        - path:
            type: PathPrefix
            value: /capture
        - path:
            type: PathPrefix
            value: /batch
      backendRefs:
        - name: capture
          port: 3000
    # Session replay capture (Rust)
    - matches:
        - path:
            type: PathPrefix
            value: /s
      backendRefs:
        - name: replay-capture
          port: 3000
    # Feature flags + /decide (Rust) — required for session replay config
    - matches:
        - path:
            type: PathPrefix
            value: /decide
        - path:
            type: PathPrefix
            value: /flags
      backendRefs:
        - name: feature-flags
          port: 3001
    # CDP webhooks
    - matches:
        - path:
            type: PathPrefix
            value: /public/webhooks
        - path:
            type: PathPrefix
            value: /public/m
      backendRefs:
        - name: plugins
          port: 6738
    # Default - Django web UI/API
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: web
          port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: posthog-ingest-external
  namespace: posthog
  labels:
    external-dns: "true"
  annotations:
    external-dns.alpha.kubernetes.io/target: "tuxgrid.com"
spec:
  parentRefs:
    - name: gateway-external
      namespace: gateway
      sectionName: https
  hostnames:
    - "ingest-posthog.tuxgrid.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /e
        - path:
            type: PathPrefix
            value: /i/v0
        - path:
            type: PathPrefix
            value: /capture
        - path:
            type: PathPrefix
            value: /batch
      backendRefs:
        - name: capture
          port: 3000
    - matches:
        - path:
            type: PathPrefix
            value: /s
      backendRefs:
        - name: replay-capture
          port: 3000
    # Feature flags + /decide (Rust) — required for session replay config
    - matches:
        - path:
            type: PathPrefix
            value: /decide
        - path:
            type: PathPrefix
            value: /flags
      backendRefs:
        - name: feature-flags
          port: 3001
    # CDP webhooks
    - matches:
        - path:
            type: PathPrefix
            value: /public/webhooks
        - path:
            type: PathPrefix
            value: /public/m
      backendRefs:
        - name: plugins
          port: 6738
    # Default fallback to web
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: web
          port: 8000
