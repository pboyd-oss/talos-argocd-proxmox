apiVersion: jenkins.io/v1alpha2
kind: Jenkins
metadata:
  name: jenkins
  namespace: jenkins
spec:
  configurationAsCode:
    configurations:
      - name: jenkins-casc
    secret:
      name: ""
  jenkinsAPISettings:
    authorizationStrategy: createUser
  master:
    disableCSRFProtection: false
    containers:
      - name: jenkins-master
        image: jenkins/jenkins:2.555.1-lts
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 12
          httpGet:
            path: /login
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 80
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /login
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 1
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1500m
            memory: 2Gi
        env:
          - name: JAVA_OPTS
            value: "-Xmx1024m -Xms256m"
        volumeMounts:
          - name: jenkins-home
            mountPath: /var/jenkins_home
    plugins:
      - name: job-dsl
        version: "1.87"
    volumes:
      - name: jenkins-home
        persistentVolumeClaim:
          claimName: jenkins-home
  seedJobs:
    - id: seed-job
      description: "Load all pipeline definitions from repo"
      repositoryBranch: main
      repositoryUrl: https://github.com/pboyd-oss/talos-argocd-proxmox.git
      targets: "my-apps/development/jenkins/jobs/**/*.groovy"
      credentialType: noCredentials
