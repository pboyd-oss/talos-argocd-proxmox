apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: jenkins

resources:
  - namespace.yaml
  - pvc.yaml
  - rbac.yaml
  - externalsecret.yaml
  - httproute.yaml
  - jobdsl-configmap.yaml

helmCharts:
  - name: jenkins
    repo: https://charts.jenkins.io
    version: "5.8.0"
    releaseName: jenkins
    namespace: jenkins
    valuesFile: values.yaml

patches:
  # Jenkins Helm chart uses a Deployment with a RWO PVC — must use Recreate
  # to avoid Multi-Attach deadlock during rollouts.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: jenkins
      spec:
        strategy:
          type: Recreate
          rollingUpdate: null
    target:
      kind: Deployment
      name: jenkins
  # All Jobs rendered by the chart must use ArgoCD hooks so Renovate image
  # bumps don't hit the "field is immutable" sync failure.
  - patch: |
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1hook
        value: Sync
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1hook-delete-policy
        value: BeforeHookCreation
    target:
      kind: Job
