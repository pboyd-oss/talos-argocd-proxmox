apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-jobdsl-scripts
  namespace: jenkins
data:
  # Boilerplate: minimal pipeline that runs on the default Kubernetes agent
  hello-world.groovy: |
    pipelineJob('examples/hello-world') {
      description('Boilerplate: runs on a dynamic Kubernetes agent pod')
      logRotator { numToKeep(10) }
      definition {
        cps {
          sandbox(true)
          script('''
    pipeline {
      agent {
        kubernetes {
          inheritFrom 'default'
        }
      }
      stages {
        stage('Hello') {
          steps {
            echo 'Hello from a Jenkins Kubernetes agent pod!'
            sh 'echo "Pod: $(hostname)  Date: $(date)"'
          }
        }
      }
    }
    ''')
        }
      }
    }

  # Deploy example: uses the skaffold agent pod to deploy a dummy app
  deploy-dummy.groovy: |
    pipelineJob('deploy/deploy-dummy-app') {
      description('''\
        Deploys a dummy nginx container to the cluster using skaffold apply.
        Runs on the "skaffold" Kubernetes agent pod which has skaffold + kubectl.
      '''.stripIndent())

      logRotator { numToKeep(20) }

      parameters {
        stringParam('TARGET_NAMESPACE', 'dummy-app', 'Kubernetes namespace to deploy into')
        stringParam('IMAGE', 'nginx:alpine', 'Container image to deploy')
        stringParam('REPLICAS', '1', 'Number of pod replicas')
      }

      definition {
        cps {
          sandbox(true)
          script('''
    pipeline {
      agent {
        kubernetes {
          inheritFrom 'skaffold'
        }
      }

      stages {
        stage('Prepare namespace') {
          steps {
            container('kubectl') {
              sh "kubectl create namespace ${params.TARGET_NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -"
            }
          }
        }

        stage('Write manifests') {
          steps {
            script {
              writeFile file: 'skaffold.yaml', text: """
    apiVersion: skaffold/v4beta11
    kind: Config
    metadata:
      name: dummy-app
    manifests:
      rawYaml:
      - k8s.yaml
    """
              writeFile file: 'k8s.yaml', text: """
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: dummy-app
      namespace: ${params.TARGET_NAMESPACE}
      labels:
        app: dummy-app
    spec:
      replicas: ${params.REPLICAS.toInteger()}
      selector:
        matchLabels:
          app: dummy-app
      template:
        metadata:
          labels:
            app: dummy-app
        spec:
          containers:
          - name: dummy
            image: ${params.IMAGE}
            ports:
            - name: http
              containerPort: 80
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: dummy-app
      namespace: ${params.TARGET_NAMESPACE}
    spec:
      selector:
        app: dummy-app
      ports:
      - name: http
        port: 80
        targetPort: 80
    """
            }
          }
        }

        stage('Skaffold apply') {
          steps {
            container('skaffold') {
              sh 'skaffold apply'
            }
          }
        }

        stage('Verify rollout') {
          steps {
            container('kubectl') {
              sh "kubectl rollout status deployment/dummy-app -n ${params.TARGET_NAMESPACE} --timeout=120s"
              sh "kubectl get pods -n ${params.TARGET_NAMESPACE} -l app=dummy-app"
            }
          }
        }
      }

      post {
        success {
          echo "Deployed ${params.IMAGE} to ${params.TARGET_NAMESPACE}"
        }
        failure {
          container('kubectl') {
            sh "kubectl describe deployment/dummy-app -n ${params.TARGET_NAMESPACE} || true"
          }
        }
      }
    }
    ''')
        }
      }
    }
