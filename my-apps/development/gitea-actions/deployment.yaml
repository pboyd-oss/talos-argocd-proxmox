# Gitea Actions runner — two-container pattern.
#
# `runner` runs act_runner (no docker baked in) and talks to a sidecar
# `dind` over a shared unix socket in /var/run. This sidesteps the bugs
# in the gitea/act_runner:*-dind image family:
#   • s6 readiness race that left act_runner blocked on s6-svwait
#   • dockerd-entrypoint.sh auto-passing --gpus=all to job containers
#   • dind's bundled server cert having incompatible TLS key usage
#
# The dind container is privileged (required for any DinD); the runner
# container is unprivileged. Workflow files stay byte-identical to a
# .github/workflows/ file — `runs-on: ubuntu-latest` still works.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: act-runner
  namespace: gitea-actions
  labels:
    app: act-runner
spec:
  replicas: 1
  strategy:
    type: Recreate          # only one runner identity, never two at once
  selector:
    matchLabels:
      app: act-runner
  template:
    metadata:
      labels:
        app: act-runner
    spec:
      containers:
        - name: runner
          # Custom build of act_runner v0.4.1 with one patch:
          # gitea.com/gitea/act @ pkg/container/docker_cli.go:604 — the
          # `DeviceRequests: copts.gpus.Value()` line was forced to nil
          # so no container ever gets a `[[gpu]]` capability cap. On a
          # host without an nvidia device driver registered, dockerd
          # rejects any container with that cap ("could not select
          # device driver"), and act_runner adds it via codepaths that
          # fire even when `container.options` is empty. The patched
          # binary lives at registry.tuxgrid.com/act_runner-nogpu:v1.
          image: registry.tuxgrid.com/act_runner-nogpu:v1
          env:
            # Talk to the dind sidecar via the shared /var/run socket.
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: GITEA_INSTANCE_URL
              value: https://gitea.tuxgrid.com
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: act-runner-token
                  key: token
            - name: GITEA_RUNNER_NAME
              value: cluster-runner-1
            - name: GITEA_RUNNER_LABELS
              value: ubuntu-latest:docker://catthehacker/ubuntu:act-latest
            - name: CONFIG_FILE
              value: /etc/act_runner/config.yaml
          volumeMounts:
            - { name: var-run, mountPath: /var/run }
            - { name: data,    mountPath: /data }
            - { name: config,  mountPath: /etc/act_runner }
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

        # Plain Docker-in-Docker. Privileged is required (the gitea-actions
        # namespace is PSA-exempt). TLS disabled because the socket is
        # only reachable from sibling containers in the same pod — no
        # network exposure. Layer cache lives in /var/lib/docker on
        # emptyDir; persistent caching is via the registry buildcache tag
        # the workflows already use.
        - name: dind
          image: docker:27-dind
          args:
            - --host=unix:///var/run/docker.sock
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          securityContext:
            privileged: true
          volumeMounts:
            - { name: var-run,        mountPath: /var/run }
            - { name: docker-storage, mountPath: /var/lib/docker }
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 4000m
              memory: 6Gi
          # Dockerd ready when `docker info` over the shared socket succeeds.
          startupProbe:
            exec:
              command: [docker, info]
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            exec:
              command: [docker, info]
            periodSeconds: 30

        # Prune sidecar — keeps the dind PVC from filling up. Runs every
        # 6h; bounds buildkit cache to 20Gi and removes stopped
        # containers + images older than 72h. Without this, the layer
        # cache grows indefinitely as new image versions keep landing.
        - name: prune
          image: docker:27-cli
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
          command:
            - sh
            - -c
            - |
              while true; do
                # Wait for dockerd before first prune (pod fresh-start case)
                for i in $(seq 1 30); do
                  docker info >/dev/null 2>&1 && break
                  sleep 2
                done
                echo "[prune] starting cycle at $(date -u)"
                docker buildx prune -af --keep-storage 20GB --filter until=24h 2>&1 || true
                docker system prune -af --filter "until=72h" 2>&1 || true
                df -h /var/lib/docker 2>/dev/null || true
                sleep 21600
              done
          volumeMounts:
            - { name: var-run, mountPath: /var/run }
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi

      volumes:
        - { name: var-run, emptyDir: {} }
        - { name: data,    emptyDir: {} }
        # /var/lib/docker is a PVC so the catthehacker image (3 GB) and
        # every base image we pull stay warm across pod restarts. See
        # pvc.yaml. Was emptyDir — every restart wiped the cache and the
        # next build re-pulled everything (≈2 min cold-start tax).
        - name: docker-storage
          persistentVolumeClaim:
            claimName: act-runner-docker-cache
        - name: config
          configMap:
            name: act-runner-config
