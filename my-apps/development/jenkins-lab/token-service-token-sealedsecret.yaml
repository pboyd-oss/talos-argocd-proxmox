# Sealed Secret for the plaintext API token value shared between Jenkins and
# the Token Service. Jenkins reads it as JENKINS_TOKEN_SERVICE_TOKEN (used by
# seed-token-service-user.groovy to seed the token-service user's API token).
# The platform namespace token-service-jenkins-creds Secret must hold the same
# plaintext value so the Token Service can authenticate to the Jenkins build API.
#
# Both secrets must be sealed from the same plaintext value. Generate it once:
#   TOKEN=$(openssl rand -hex 20)
#
# Seal this secret (jenkins namespace):
#   kubectl create secret generic token-service-token \
#     --namespace jenkins \
#     --from-literal=token="$TOKEN" \
#     --dry-run=client -o yaml \
#   | kubeseal --controller-namespace kube-system --controller-name sealed-secrets \
#     --format yaml > token-service-token-sealedsecret.yaml
#
# Seal the Token Service secret (platform namespace):
#   kubectl create secret generic token-service-jenkins-creds \
#     --namespace platform \
#     --from-literal=api-token="$TOKEN" \
#     --dry-run=client -o yaml \
#   | kubeseal --controller-namespace kube-system --controller-name sealed-secrets \
#     --format yaml > ../../../infrastructure/platform/token-service/token-service-jenkins-creds-sealedsecret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: token-service-token
  namespace: jenkins
spec:
  encryptedData:
    token: PLACEHOLDER__run_kubeseal_to_generate
  template:
    metadata:
      name: token-service-token
      namespace: jenkins
