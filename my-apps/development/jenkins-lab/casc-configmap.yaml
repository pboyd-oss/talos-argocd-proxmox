apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-casc
  namespace: jenkins
data:
  01-kubernetes-cloud.yaml: |
    jenkins:
      clouds:
        - kubernetes:
            name: "kubernetes"
            serverUrl: "https://kubernetes.default.svc"
            namespace: "jenkins"
            jenkinsUrl: "http://jenkins-operator-http-jenkins.jenkins.svc.cluster.local:8080"
            jenkinsTunnel: "jenkins-operator-slave-jenkins.jenkins.svc.cluster.local:50000"
            templates:
              - name: "default"
                label: "default"
                serviceAccount: "jenkins"
                podLabels:
                  - key: "role"
                    value: "build"
                containers:
                  - name: "jnlp"
                    image: "harbor.tuxgrid.com/docker.io/jenkins/inbound-agent:latest-jdk21"
              - name: "skaffold"
                label: "skaffold"
                serviceAccount: "jenkins"
                podLabels:
                  - key: "role"
                    value: "build"
                volumes:
                  - secretVolume:
                      mountPath: "/cosign-key"
                      secretName: "cosign-key"
                  - secretVolume:
                      mountPath: "/root/.docker"
                      secretName: "gitea-docker-cfg"
                containers:
                  - name: "skaffold"
                    image: "harbor.tuxgrid.com/gcr.io/k8s-skaffold/skaffold:v2.15.0"
                    command: "cat"
                    ttyEnabled: true
                  - name: "kubectl"
                    image: "harbor.tuxgrid.com/docker.io/alpine/k8s:1.31.4"
                    command: "cat"
                    ttyEnabled: true
                  - name: "golang"
                    image: "harbor.tuxgrid.com/docker.io/golang:1.23"
                    command: "cat"
                    ttyEnabled: true
              - name: "platform-scanner"
                label: "platform-scanner"
                serviceAccount: "jenkins"
                podLabels:
                  - key: "role"
                    value: "platform-scanner"
                volumes:
                  - secretVolume:
                      mountPath: "/root/.docker"
                      secretName: "gitea-docker-cfg"
                containers:
                  - name: "trivy"
                    image: "harbor.tuxgrid.com/aquasecurity/trivy:0.60.0"
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "2Gi"
                  - name: "checkov"
                    image: "harbor.tuxgrid.com/bridgecrew/checkov:3.2.285"
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "250m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "500m"
                    resourceLimitMemory: "1Gi"
                  - name: "cosign"
                    image: "harbor.tuxgrid.com/sigstore/cosign:v2.5.2"
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "128Mi"
              - name: "platform-deployer"
                label: "platform-deployer"
                serviceAccount: "platform-deployer"
                podLabels:
                  - key: "role"
                    value: "platform-deployer"
                yaml: |
                  spec:
                    volumes:
                      - name: k8s-sa-token
                        projected:
                          sources:
                            - serviceAccountToken:
                                audience: platform-token-service
                                expirationSeconds: 600
                                path: token
                    containers:
                      - name: awscli
                        volumeMounts:
                          - name: k8s-sa-token
                            mountPath: /run/secrets/kubernetes
                            readOnly: true
                containers:
                  - name: "terraform"
                    image: "harbor.tuxgrid.com/hashicorp/terraform:1.9.0"
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "250m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "1Gi"
                  - name: "awscli"
                    image: "harbor.tuxgrid.com/amazon/aws-cli:2.15.0"
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "128Mi"
  02-global-env.yaml: |
    jenkins:
      globalNodeProperties:
        - envVars:
            env:
              - key: "REGISTRY"
                value: "gitea.tuxgrid.com/pboyd"
  03-security.yaml: |
    security:
      globalJobDslSecurityConfiguration:
        useScriptSecurity: false
  04-global-library.yaml: |
    unclassified:
      globalLibraries:
        libraries:
          - name: "jenkins-library"
            defaultVersion: "main"
            implicit: true
            allowVersionOverride: false
            retriever:
              modernSCM:
                scm:
                  git:
                    remote: "https://github.com/pboyd-oss/jenkins-library.git"
  05-credentials.yaml: |
    credentials:
      system:
        domainCredentials:
          - credentials:
              - basicSSHUserPrivateKey:
                  scope: GLOBAL
                  id: "git-deploy-key"
                  description: "SSH deploy key for internal team repos"
                  username: git
                  privateKeySource:
                    directEntry:
                      privateKey: "${GIT_DEPLOY_KEY}"
              - string:
                  scope: GLOBAL
                  id: "cosign-key"
                  description: "Cosign private key for attestation and image signing"
                  secret: "${COSIGN_PRIVATE_KEY}"
              - string:
                  scope: GLOBAL
                  id: "cosign-public-key"
                  description: "Cosign public key for attestation verification"
                  secret: "${COSIGN_PUBLIC_KEY}"
  06-oidc-provider.yaml: |
    unclassified:
      jwtTokenConfiguration:
        enabled: true
        tokenExpiration: 600
        algorithmConfiguration:
          algorithm: "RS256"
        claimsTemplates:
          - claimName: "sub"
            valueTemplate: "${JOB_NAME}"
          - claimName: "team_slug"
            valueTemplate: "${TUXGRID_TEAM_SLUG}"
          - claimName: "build_number"
            valueTemplate: "${BUILD_NUMBER}"
          - claimName: "aud"
            valueTemplate: "platform-token-service"
