apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-casc
  namespace: jenkins
data:
  01-kubernetes-cloud.yaml: |
    jenkins:
      clouds:
        - kubernetes:
            name: "kubernetes"
            serverUrl: "https://kubernetes.default.svc"
            namespace: "jenkins"
            jenkinsUrl: "http://jenkins-operator-http-jenkins.jenkins.svc.cluster.local:8080"
            jenkinsTunnel: "jenkins-operator-slave-jenkins.jenkins.svc.cluster.local:50000"
            containerCap: 15
            templates:
              - name: "default"
                label: "default"
                serviceAccount: "jenkins"
                containers:
                  - name: "jnlp"
                    image: "harbor.tuxgrid.com/docker.io/jenkins/inbound-agent:latest-jdk21"
              - name: "skaffold"
                label: "skaffold"
                serviceAccount: "jenkins"
                volumes:
                  - secretVolume:
                      mountPath: "/root/.docker"
                      secretName: "gitea-docker-cfg"
                containers:
                  - name: "skaffold"
                    image: "harbor.tuxgrid.com/gcr.io/k8s-skaffold/skaffold:v2.15.0"
                    command: "cat"
                    ttyEnabled: true
                  - name: "kubectl"
                    image: "harbor.tuxgrid.com/docker.io/alpine/k8s:1.31.4"
                    command: "cat"
                    ttyEnabled: true
                  - name: "golang"
                    image: "harbor.tuxgrid.com/docker.io/golang:1.23"
                    command: "cat"
                    ttyEnabled: true
                  - name: "deploy-sec-base"
                    image: "harbor.tuxgrid.com/platform/deploy-sec-base:latest"
                    alwaysPullImage: true
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "512Mi"
              - name: "deploy-sec-base"
                label: "deploy-sec-base"
                serviceAccount: "jenkins"
                yaml: |
                  metadata:
                    labels:
                      role: platform-deployer
                volumes:
                  - secretVolume:
                      mountPath: "/root/.docker"
                      secretName: "gitea-docker-cfg"
                containers:
                  - name: "deploy-sec-base"
                    image: "harbor.tuxgrid.com/platform/deploy-sec-base:latest"
                    alwaysPullImage: true
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "2Gi"
              - name: "platform-deployer"
                label: "platform-deployer"
                serviceAccount: "platform-deployer"
                yaml: |
                  spec:
                    volumes:
                      - name: k8s-sa-token
                        projected:
                          sources:
                            - serviceAccountToken:
                                audience: platform-token-service
                                expirationSeconds: 600
                                path: token
                    containers:
                      - name: awscli
                        volumeMounts:
                          - name: k8s-sa-token
                            mountPath: /run/secrets/kubernetes
                            readOnly: true
                containers:
                  - name: "terraform"
                    image: "harbor.tuxgrid.com/docker.io/hashicorp/terraform:1.9.0"
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "250m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "1Gi"
                  - name: "awscli"
                    image: "harbor.tuxgrid.com/docker.io/amazon/aws-cli:2.15.0"
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "128Mi"
              - name: "kaniko-builder"
                label: "kaniko-builder"
                serviceAccount: "jenkins"
                volumes:
                  - secretVolume:
                      mountPath: "/kaniko/.docker"
                      secretName: "gitea-docker-cfg"
                containers:
                  - name: "jnlp"
                    image: "harbor.tuxgrid.com/docker.io/jenkins/inbound-agent:latest-jdk21"
                    resourceRequestCpu: "50m"
                    resourceRequestMemory: "128Mi"
                    resourceLimitCpu: "500m"
                    resourceLimitMemory: "512Mi"
                  - name: "kaniko"
                    image: "harbor.tuxgrid.com/gcr.io/kaniko-project/executor:v1.23.2-debug"
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
              - name: "deploy-sec-base-builder"
                label: "deploy-sec-base-builder"
                serviceAccount: "jenkins"
                yaml: |
                  metadata:
                    labels:
                      role: build
                  spec:
                    initContainers:
                      - name: init-mitm-conf
                        image: harbor.tuxgrid.com/docker.io/alpine:3.20
                        command: ["sh", "-c", "cp /mitm-ca-secret/mitmproxy-ca.pem /mitm-conf/mitmproxy-ca.pem && cp /mitm-ca-secret/mitmproxy-ca-cert.pem /mitm-data/ca.pem"]
                        volumeMounts:
                          - name: mitm-conf
                            mountPath: /mitm-conf
                          - name: mitm-ca-secret
                            mountPath: /mitm-ca-secret
                            readOnly: true
                          - name: mitm-data
                            mountPath: /mitm-data
                    containers:
                      - name: mitmproxy
                        image: harbor.tuxgrid.com/docker.io/mitmproxy/mitmproxy:11
                        args: ["mitmdump", "--set", "confdir=/mitm-conf", "--scripts", "/hooks/hooks.py", "--listen-port", "8080", "--quiet"]
                        env:
                          - name: MITM_EXTRA_HOSTS
                            value: "archive.ubuntu.com,security.ubuntu.com,pypi.org,files.pythonhosted.org"
                        resources:
                          requests:
                            cpu: "50m"
                            memory: "128Mi"
                          limits:
                            cpu: "500m"
                            memory: "256Mi"
                        volumeMounts:
                          - name: mitm-data
                            mountPath: /mitm-data
                          - name: mitm-conf
                            mountPath: /mitm-conf
                          - name: mitm-hooks
                            mountPath: /hooks
                            readOnly: true
                      - name: kaniko
                        env:
                          - name: HTTPS_PROXY
                            value: "http://localhost:8080"
                          - name: SSL_CERT_FILE
                            value: "/mitm-data/ca.pem"
                        volumeMounts:
                          - name: mitm-data
                            mountPath: /mitm-data
                            readOnly: true
                      - name: cosign
                        env:
                          - name: HTTPS_PROXY
                            value: "http://localhost:8080"
                          - name: SSL_CERT_FILE
                            value: "/mitm-data/ca.pem"
                        volumeMounts:
                          - name: mitm-data
                            mountPath: /mitm-data
                            readOnly: true
                      - name: deploy-sec-base
                        env:
                          - name: HTTPS_PROXY
                            value: "http://localhost:8080"
                          - name: HTTP_PROXY
                            value: "http://localhost:8080"
                          - name: NO_PROXY
                            value: "kubernetes.default.svc,.cluster.local,localhost,127.0.0.1"
                          - name: SSL_CERT_FILE
                            value: "/mitm-data/ca.pem"
                        volumeMounts:
                          - name: mitm-data
                            mountPath: /mitm-data
                            readOnly: true
                    volumes:
                      - name: mitm-data
                        emptyDir: {}
                      - name: mitm-conf
                        emptyDir: {}
                      - name: mitm-ca-secret
                        secret:
                          secretName: mitm-ca-secret
                      - name: mitm-hooks
                        configMap:
                          name: mitm-hooks
                containers:
                  - name: "kaniko"
                    image: "harbor.tuxgrid.com/gcr.io/kaniko-project/executor:v1.23.2-debug"
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                  - name: "cosign"
                    image: "harbor.tuxgrid.com/platform/cosign:v2.5.2"
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "64Mi"
                    resourceLimitCpu: "500m"
                    resourceLimitMemory: "256Mi"
                  - name: "deploy-sec-base"
                    image: "harbor.tuxgrid.com/platform/deploy-sec-base:latest"
                    alwaysPullImage: true
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "512Mi"
              - name: "platform-builder"
                label: "platform-builder"
                serviceAccount: "jenkins"
                yaml: |
                  metadata:
                    labels:
                      role: build
                  spec:
                    initContainers:
                      - name: init-mitm-conf
                        image: harbor.tuxgrid.com/docker.io/alpine:3.20
                        command: ["sh", "-c", "cp /mitm-ca-secret/mitmproxy-ca.pem /mitm-conf/mitmproxy-ca.pem && cp /mitm-ca-secret/mitmproxy-ca-cert.pem /mitm-data/ca.pem"]
                        volumeMounts:
                          - name: mitm-conf
                            mountPath: /mitm-conf
                          - name: mitm-ca-secret
                            mountPath: /mitm-ca-secret
                            readOnly: true
                          - name: mitm-data
                            mountPath: /mitm-data
                    containers:
                      - name: mitmproxy
                        image: harbor.tuxgrid.com/docker.io/mitmproxy/mitmproxy:11
                        args: ["mitmdump", "--set", "confdir=/mitm-conf", "--scripts", "/hooks/hooks.py", "--listen-port", "8080", "--quiet"]
                        env:
                          - name: MITM_EXTRA_HOSTS
                            value: "proxy.golang.org,sum.golang.org,storage.googleapis.com,archive.ubuntu.com,security.ubuntu.com,github.com,objects.githubusercontent.com,pypi.org,files.pythonhosted.org,download.pytorch.org"
                        resources:
                          requests:
                            cpu: "50m"
                            memory: "128Mi"
                          limits:
                            cpu: "500m"
                            memory: "256Mi"
                        volumeMounts:
                          - name: mitm-data
                            mountPath: /mitm-data
                          - name: mitm-conf
                            mountPath: /mitm-conf
                          - name: mitm-hooks
                            mountPath: /hooks
                            readOnly: true
                      - name: jnlp
                        env:
                          - name: HTTPS_PROXY
                            value: "http://localhost:8080"
                          - name: HTTP_PROXY
                            value: "http://localhost:8080"
                          - name: NO_PROXY
                            value: "kubernetes.default.svc,.cluster.local,localhost,127.0.0.1"
                          - name: GIT_SSL_CAINFO
                            value: "/mitm-data/ca.pem"
                        volumeMounts:
                          - name: mitm-data
                            mountPath: /mitm-data
                            readOnly: true
                      - name: kaniko
                        env:
                          - name: HTTPS_PROXY
                            value: "http://localhost:8080"
                          - name: SSL_CERT_FILE
                            value: "/mitm-data/ca.pem"
                        volumeMounts:
                          - name: mitm-data
                            mountPath: /mitm-data
                            readOnly: true
                      - name: deploy-sec-base
                        env:
                          - name: HTTPS_PROXY
                            value: "http://localhost:8080"
                          - name: HTTP_PROXY
                            value: "http://localhost:8080"
                          - name: NO_PROXY
                            value: "kubernetes.default.svc,.cluster.local,localhost,127.0.0.1"
                          - name: SSL_CERT_FILE
                            value: "/mitm-data/ca.pem"
                        volumeMounts:
                          - name: mitm-data
                            mountPath: /mitm-data
                            readOnly: true
                    volumes:
                      - name: mitm-data
                        emptyDir: {}
                      - name: mitm-conf
                        emptyDir: {}
                      - name: mitm-ca-secret
                        secret:
                          secretName: mitm-ca-secret
                      - name: mitm-hooks
                        configMap:
                          name: mitm-hooks
                containers:
                  - name: "kaniko"
                    image: "harbor.tuxgrid.com/gcr.io/kaniko-project/executor:v1.23.2-debug"
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                  - name: "deploy-sec-base"
                    image: "harbor.tuxgrid.com/platform/deploy-sec-base:latest"
                    alwaysPullImage: true
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "512Mi"
        - kubernetes:
            name: "build-shared"
            serverUrl: "https://kubernetes.default.svc"
            namespace: "jenkins"
            jenkinsUrl: "http://jenkins-operator-http-jenkins.jenkins.svc.cluster.local:8080"
            jenkinsTunnel: "jenkins-operator-slave-jenkins.jenkins.svc.cluster.local:50000"
            containerCap: 5
            templates:
              - name: "base"
                label: "base"
                serviceAccount: "jenkins"
                volumes:
                  - secretVolume:
                      mountPath: "/root/.docker"
                      secretName: "gitea-docker-cfg"
                containers:
                  - name: "skaffold"
                    image: "harbor.tuxgrid.com/gcr.io/k8s-skaffold/skaffold:v2.15.0"
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "128Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "1Gi"
                  - name: "golang"
                    image: "harbor.tuxgrid.com/docker.io/golang:1.23"
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "128Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "1Gi"
              - name: "platform-builder"
                label: "platform-builder"
                serviceAccount: "jenkins"
                yaml: |
                  metadata:
                    labels:
                      role: build
                  spec:
                    initContainers:
                      - name: init-mitm-conf
                        image: harbor.tuxgrid.com/docker.io/alpine:3.20
                        command: ["sh", "-c", "cp /mitm-ca-secret/mitmproxy-ca.pem /mitm-conf/mitmproxy-ca.pem && cp /mitm-ca-secret/mitmproxy-ca-cert.pem /mitm-data/ca.pem"]
                        volumeMounts:
                          - name: mitm-conf
                            mountPath: /mitm-conf
                          - name: mitm-ca-secret
                            mountPath: /mitm-ca-secret
                            readOnly: true
                          - name: mitm-data
                            mountPath: /mitm-data
                    containers:
                      - name: mitmproxy
                        image: harbor.tuxgrid.com/docker.io/mitmproxy/mitmproxy:11
                        args: ["mitmdump", "--set", "confdir=/mitm-conf", "--scripts", "/hooks/hooks.py", "--listen-port", "8080", "--quiet"]
                        env:
                          - name: MITM_EXTRA_HOSTS
                            value: "proxy.golang.org,sum.golang.org,storage.googleapis.com,archive.ubuntu.com,security.ubuntu.com,github.com,objects.githubusercontent.com,pypi.org,files.pythonhosted.org,download.pytorch.org"
                        resources:
                          requests:
                            cpu: "50m"
                            memory: "128Mi"
                          limits:
                            cpu: "500m"
                            memory: "256Mi"
                        volumeMounts:
                          - name: mitm-data
                            mountPath: /mitm-data
                          - name: mitm-conf
                            mountPath: /mitm-conf
                          - name: mitm-hooks
                            mountPath: /hooks
                            readOnly: true
                      - name: jnlp
                        env:
                          - name: HTTPS_PROXY
                            value: "http://localhost:8080"
                          - name: HTTP_PROXY
                            value: "http://localhost:8080"
                          - name: NO_PROXY
                            value: "kubernetes.default.svc,.cluster.local,localhost,127.0.0.1"
                          - name: GIT_SSL_CAINFO
                            value: "/mitm-data/ca.pem"
                        volumeMounts:
                          - name: mitm-data
                            mountPath: /mitm-data
                            readOnly: true
                      - name: kaniko
                        env:
                          - name: HTTPS_PROXY
                            value: "http://localhost:8080"
                          - name: SSL_CERT_FILE
                            value: "/mitm-data/ca.pem"
                        volumeMounts:
                          - name: mitm-data
                            mountPath: /mitm-data
                            readOnly: true
                      - name: deploy-sec-base
                        env:
                          - name: HTTPS_PROXY
                            value: "http://localhost:8080"
                          - name: HTTP_PROXY
                            value: "http://localhost:8080"
                          - name: NO_PROXY
                            value: "kubernetes.default.svc,.cluster.local,localhost,127.0.0.1"
                          - name: SSL_CERT_FILE
                            value: "/mitm-data/ca.pem"
                        volumeMounts:
                          - name: mitm-data
                            mountPath: /mitm-data
                            readOnly: true
                    volumes:
                      - name: mitm-data
                        emptyDir: {}
                      - name: mitm-conf
                        emptyDir: {}
                      - name: mitm-ca-secret
                        secret:
                          secretName: mitm-ca-secret
                      - name: mitm-hooks
                        configMap:
                          name: mitm-hooks
                containers:
                  - name: "kaniko"
                    image: "harbor.tuxgrid.com/gcr.io/kaniko-project/executor:v1.23.2-debug"
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                  - name: "deploy-sec-base"
                    image: "harbor.tuxgrid.com/platform/deploy-sec-base:latest"
                    alwaysPullImage: true
                    command: "cat"
                    ttyEnabled: true
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "1"
                    resourceLimitMemory: "512Mi"
  02-global-env.yaml: |
    jenkins:
      globalNodeProperties:
        - envVars:
            env:
              - key: "REGISTRY"
                value: "gitea.tuxgrid.com/pboyd"
  03-security.yaml: |
    security:
      globalJobDslSecurityConfiguration:
        useScriptSecurity: false
      scriptApproval:
        approvedSignatures:
          - "staticMethod jenkins.model.Jenkins get"
          - "method hudson.model.ItemGroup getAllItems java.lang.Class"
          - "method jenkins.model.Jenkins getItemByFullName java.lang.String"
          - "method jenkins.model.FullyNamed getFullName"
          - "method hudson.model.Item getFullName"
          - "method hudson.model.Job getFullName"
          - "method hudson.model.Job getLastSuccessfulBuild"
          - "method hudson.model.Job isBuildable"
          - "method hudson.model.AbstractProject getLastSuccessfulBuild"
          - "method hudson.model.Run getTimeInMillis"
          - "method hudson.model.Run getArtifactsDir"
          - "method hudson.model.AbstractBuild getArtifactsDir"
          - "new java.io.File java.io.File java.lang.String"
          - "new java.io.File java.lang.String java.lang.String"
          - "method java.io.File exists"
          - "method java.io.File getText"
          - "method java.io.File getText java.lang.String"
          - "method java.io.File getAbsolutePath"
          - "method java.io.File isFile"
          - "method java.io.File isDirectory"
          - "method java.io.File listFiles"
          - "method java.io.File getName"
  04-global-library.yaml: |
    unclassified:
      globalLibraries:
        libraries:
          - name: "jenkins-library"
            defaultVersion: "main"
            implicit: true
            allowVersionOverride: false
            retriever:
              modernSCM:
                scm:
                  git:
                    remote: "https://github.com/pboyd-oss/jenkins-library.git"
  05-credentials.yaml: |
    credentials:
      system:
        domainCredentials:
          - credentials:
              - basicSSHUserPrivateKey:
                  scope: GLOBAL
                  id: "git-deploy-key"
                  description: "SSH deploy key for internal team repos"
                  username: git
                  privateKeySource:
                    directEntry:
                      privateKey: "${GIT_DEPLOY_KEY}"
              - string:
                  scope: GLOBAL
                  id: "cosign-key"
                  description: "Cosign private key for attestation and image signing"
                  secret: "${COSIGN_PRIVATE_KEY}"
              - string:
                  scope: GLOBAL
                  id: "cosign-public-key"
                  description: "Cosign public key for attestation verification"
                  secret: "${COSIGN_PUBLIC_KEY}"
              - string:
                  scope: GLOBAL
                  id: "infracost-api-key"
                  description: "Infracost API key for cost estimation"
                  secret: "${INFRACOST_API_KEY}"
              - usernamePassword:
                  scope: GLOBAL
                  id: "harbor-robot-platform"
                  description: "Harbor robot account for platform image pushes"
                  username: "robot$platform+jenkins"
                  password: "${HARBOR_ROBOT_PLATFORM_TOKEN}"
              - string:
                  scope: GLOBAL
                  id: "github-token"
                  description: "GitHub PAT for infra-terraform PR comments and branch source"
                  secret: "${GITHUB_TOKEN_INFRA}"
              - usernamePassword:
                  scope: GLOBAL
                  id: "aws-terraform"
                  description: "AWS credentials for Terraform — infra-terraform repo"
                  username: "${AWS_TERRAFORM_KEY_ID}"
                  password: "${AWS_TERRAFORM_SECRET_KEY}"
  06-oidc-provider.yaml: |
    # oidcProvider JCasC configurator not available in this plugin version
    # configured programmatically via seed-token-service-user.groovy instead
