apiVersion: jenkins.io/v1alpha2
kind: Jenkins
metadata:
  name: jenkins
  namespace: jenkins
spec:
  configurationAsCode:
    configurations:
      - name: jenkins-casc
    secret:
      name: ""
  groovyScripts:
    configurations:
      - name: jenkins-groovy-init
    secret:
      name: ""
  jenkinsAPISettings:
    authorizationStrategy: createUser
  master:
    disableCSRFProtection: true
    volumes:
      - name: init-groovy
        configMap:
          name: jenkins-groovy-init
    containers:
      - name: jenkins-master
        image: harbor.tuxgrid.com/docker.io/jenkins/jenkins:2.555.1-lts-jdk21
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - name: init-groovy
            mountPath: /var/jenkins/init-configuration/01-audit-graph-listener.groovy
            subPath: 01-audit-graph-listener.groovy
          - name: init-groovy
            mountPath: /var/jenkins/init-configuration/02-attest-build-listener.groovy
            subPath: 02-attest-build-listener.groovy
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1500m
            memory: 2Gi
        env:
          - name: JAVA_OPTS
            value: "-Xmx1024m -Xms256m -Djenkins.install.runSetupWizard=false -Djava.awt.headless=true"
          - name: GIT_DEPLOY_KEY
            valueFrom:
              secretKeyRef:
                name: jenkins-credentials
                key: git-deploy-key
          - name: COSIGN_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: jenkins-credentials
                key: cosign-private-key
          - name: COSIGN_PUBLIC_KEY
            valueFrom:
              secretKeyRef:
                name: jenkins-credentials
                key: cosign-public-key
          - name: JENKINS_TOKEN_SERVICE_TOKEN
            valueFrom:
              secretKeyRef:
                name: token-service-token
                key: token
          - name: INFRACOST_API_KEY
            valueFrom:
              secretKeyRef:
                name: infracost-api-key
                key: api-key
          - name: HARBOR_ROBOT_PLATFORM_TOKEN
            valueFrom:
              secretKeyRef:
                name: harbor-robot-platform
                key: token
          - name: AUDIT_INGEST_SECRET
            valueFrom:
              secretKeyRef:
                name: audit-ingest-secret
                key: token
          - name: GITHUB_TOKEN_INFRA
            valueFrom:
              secretKeyRef:
                name: terraform-credentials
                key: github-token
          - name: AWS_TERRAFORM_KEY_ID
            valueFrom:
              secretKeyRef:
                name: terraform-credentials
                key: aws-access-key-id
          - name: AWS_TERRAFORM_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: terraform-credentials
                key: aws-secret-access-key
        livenessProbe:
          httpGet:
            path: /login
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 420
          periodSeconds: 30
          failureThreshold: 10
          successThreshold: 1
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /login
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 120
          periodSeconds: 15
          failureThreshold: 20
          successThreshold: 1
          timeoutSeconds: 10
    basePlugins:
      - name: kubernetes
        version: "4423.vb_59f230b_ce53"
      - name: workflow-job
        version: "1571.1580.v18e46842c125"
      - name: workflow-aggregator
        version: "608.v67378e9d3db_1"
      - name: git
        version: "5.10.1"
      - name: job-dsl
        version: "3654.vdf58f53e2d15"
      - name: configuration-as-code
        version: "2053.vb_0da_47381a_25"
      - name: kubernetes-credentials-provider
        version: "1.303.vdfcf47fb_b_fef"
    plugins:
      - name: pipeline-utility-steps
        version: "latest"
      - name: copyartifact
        version: "latest"
      - name: role-strategy
        version: "latest"
      - name: jacoco
        version: "latest"
      - name: junit
        version: "latest"
      - name: oidc-provider
        version: "latest"
      - name: matrix-auth
        version: "latest"
      - name: folder-properties
        version: "latest"
      - name: envinject
        version: "latest"
      - name: github-branch-source
        version: "latest"
  seedJobAgentImage: "harbor.tuxgrid.com/docker.io/jenkins/inbound-agent:latest-jdk21"
  seedJobs:
    - id: seed-job
      description: "Load all pipeline definitions"
      repositoryBranch: main
      repositoryUrl: https://github.com/pboyd-oss/seed-jobs.git
      targets: "jobs/**/*.groovy"
      credentialType: ""
