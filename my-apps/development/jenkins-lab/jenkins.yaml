apiVersion: jenkins.io/v1alpha2
kind: Jenkins
metadata:
  name: jenkins
  namespace: jenkins
spec:
  configurationAsCode:
    configurations:
      - name: jenkins-casc
    secret:
      name: ""
  groovyScripts:
    configurations: []
    secret:
      name: ""
  jenkinsAPISettings:
    authorizationStrategy: createUser
  master:
    disableCSRFProtection: false
    containers:
      - name: jenkins-master
        image: jenkins/jenkins:2.555.1-lts-jdk21
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1500m
            memory: 2Gi
        env:
          - name: JAVA_OPTS
            value: "-Xmx1024m -Xms256m -Djenkins.install.runSetupWizard=false -Djava.awt.headless=true"
        livenessProbe:
          httpGet:
            path: /login
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 300
          periodSeconds: 10
          failureThreshold: 6
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /login
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 6
          timeoutSeconds: 5
        volumeMounts:
          - name: jenkins-data
            mountPath: /var/lib/jenkins
    volumes:
      - name: jenkins-data
        persistentVolumeClaim:
          claimName: jenkins-home
    basePlugins:
      - name: kubernetes
        version: "4423.vb_59f230b_ce53"
      - name: workflow-job
        version: "1571.1580.v18e46842c125"
      - name: workflow-aggregator
        version: "608.v67378e9d3db_1"
      - name: git
        version: "5.10.1"
      - name: job-dsl
        version: "3654.vdf58f53e2d15"
      - name: configuration-as-code
        version: "2053.vb_0da_47381a_25"
      - name: kubernetes-credentials-provider
        version: "1.303.vdfcf47fb_b_fef"
    plugins: []
  seedJobAgentImage: "jenkins/inbound-agent:latest-jdk21"
  seedJobs:
    - id: seed-job
      description: "Load all pipeline definitions"
      repositoryBranch: main
      repositoryUrl: https://github.com/pboyd-oss/seed-jobs.git
      targets: "jobs/**/*.groovy"
      credentialType: ""
