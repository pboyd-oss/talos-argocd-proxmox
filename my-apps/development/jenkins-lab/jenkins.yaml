apiVersion: jenkins.io/v1alpha2
kind: Jenkins
metadata:
  name: jenkins
  namespace: jenkins
spec:
  configurationAsCode:
    configurations:
      - name: jenkins-casc
    secret:
      name: ""
  groovyScripts:
    configurations:
      - name: jenkins-groovy-init
    secret:
      name: ""
  jenkinsAPISettings:
    authorizationStrategy: createUser
  master:
    disableCSRFProtection: false
    containers:
      - name: jenkins-master
        image: harbor.tuxgrid.com/docker.io/jenkins/jenkins:2.555.1-lts-jdk21
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1500m
            memory: 2Gi
        env:
          - name: JAVA_OPTS
            value: "-Xmx1024m -Xms256m -Djenkins.install.runSetupWizard=false -Djava.awt.headless=true"
          - name: GIT_DEPLOY_KEY
            valueFrom:
              secretKeyRef:
                name: jenkins-credentials
                key: git-deploy-key
          - name: COSIGN_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: jenkins-credentials
                key: cosign-private-key
          - name: COSIGN_PUBLIC_KEY
            valueFrom:
              secretKeyRef:
                name: jenkins-credentials
                key: cosign-public-key
          - name: JENKINS_TOKEN_SERVICE_TOKEN
            valueFrom:
              secretKeyRef:
                name: token-service-token
                key: token
        livenessProbe:
          httpGet:
            path: /login
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 420
          periodSeconds: 30
          failureThreshold: 10
          successThreshold: 1
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /login
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 120
          periodSeconds: 15
          failureThreshold: 20
          successThreshold: 1
          timeoutSeconds: 10
    basePlugins:
      - name: kubernetes
        version: "4423.vb_59f230b_ce53"
      - name: workflow-job
        version: "1571.1580.v18e46842c125"
      - name: workflow-aggregator
        version: "608.v67378e9d3db_1"
      - name: git
        version: "5.10.1"
      - name: job-dsl
        version: "3654.vdf58f53e2d15"
      - name: configuration-as-code
        version: "2053.vb_0da_47381a_25"
      - name: kubernetes-credentials-provider
        version: "1.303.vdfcf47fb_b_fef"
    plugins:
      - name: pipeline-utility-steps
        version: "2.20.0"
      - name: copyartifact
        version: "756.vda_a_68a_dae5f5"
      - name: role-strategy
        version: "703.vd4b_7b_29b_9d64"
      - name: jacoco
        version: "3.3.9"
      - name: jwt-support
        version: "72.v8a_514fc5a_d8b_"
  seedJobAgentImage: "harbor.tuxgrid.com/docker.io/jenkins/inbound-agent:latest-jdk21"
  seedJobs:
    - id: seed-job
      description: "Load all pipeline definitions"
      repositoryBranch: main
      repositoryUrl: https://github.com/pboyd-oss/seed-jobs.git
      targets: "jobs/**/*.groovy"
      credentialType: ""
