apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: deploy-dummy-nginx
build:
  artifacts:
    - image: REGISTRY_PLACEHOLDER/dummy-nginx
      kaniko:
        dockerfile: Dockerfile
  cluster:
    pullSecretName: registry-credentials
    namespace: jenkins
manifests:
  kustomize:
    paths:
      - manifests
deploy:
  kubectl: {}
