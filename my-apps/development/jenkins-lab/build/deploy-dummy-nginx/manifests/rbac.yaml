apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dummy-nginx
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dummy-nginx
  namespace: default
subjects:
  - kind: ServiceAccount
    name: dummy-nginx
    namespace: default
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: dummy-nginx
