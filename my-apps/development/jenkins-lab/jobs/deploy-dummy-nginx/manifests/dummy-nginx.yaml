apiVersion: apps/v1
kind: Deployment
metadata:
  name: dummy-nginx
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dummy-nginx
  template:
    metadata:
      labels:
        app: dummy-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
