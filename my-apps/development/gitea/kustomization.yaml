apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gitea
resources:
- namespace.yaml
- httproute.yaml
- sealedsecret.yaml
helmCharts:
- name: gitea
  repo: https://dl.gitea.com/charts/
  version: 12.5.3
  releaseName: gitea
  namespace: gitea
  valuesFile: values.yaml

patches:
- path: fix-permissions-patch.yaml
  target:
    kind: Deployment
    name: gitea
