# radar-ng open-meteo Temporal worker — second worker pool.
#
# Image is FROM ghcr.io/open-meteo/open-meteo (Swift binary at
# /app/openmeteo-api) with Python + temporalio layered on top. The activity
# subprocess-execs the binary; no Kubernetes Job/CronJob resources are
# created in the cluster.
#
# The Temporal Worker Controller injects TEMPORAL_* env vars at runtime.
apiVersion: temporal.io/v1alpha1
kind: TemporalWorkerDeployment
metadata:
  name: radar-ng-open-meteo-worker
  namespace: radar-ng
  labels:
    app: radar-ng-open-meteo-worker
spec:
  replicas: 1
  workerOptions:
    connectionRef:
      name: cluster-temporal
    temporalNamespace: default
  rollout:
    strategy: Progressive
    steps:
      - rampPercentage: 100
        pauseDuration: 1m
  sunset:
    scaledownDelay: 5m
    deleteDelay: 30m
  template:
    metadata:
      labels:
        app: radar-ng-open-meteo-worker
    spec:
      # Upstream image runs as uid 999.
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: registry.vanillax.me/radar-ng-open-meteo-worker:v1.0.0
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          env:
            - name: OPENMETEO_BIN
              value: /app/openmeteo-api
            - name: OPENMETEO_DATA_DIR
              value: /app/data
          volumeMounts:
            - { name: openmeteo-data, mountPath: /app/data }
          resources:
            requests: { cpu: "200m",  memory: "512Mi" }
            limits:   { cpu: "2",     memory: "4Gi" }
      volumes:
        - name: openmeteo-data
          persistentVolumeClaim:
            claimName: openmeteo-data
