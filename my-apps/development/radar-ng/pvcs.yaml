# Shared Longhorn RWX PVCs for the radar-ng backend.
#
# Access-mode rationale:
#   - tiles/grids/state are written by multiple pods (ingestors, nowcast) and
#     read by tile-server, so RWX.
#   - openmeteo-data is written by the serve Deployment and its sync CronJobs,
#     which can run concurrently with serve, so RWX.
#
# Longhorn RWX auto-provisions an NFS share-manager pod for each volume.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tiles
  namespace: radar-ng
  labels:
    backup-exempt: "true"
  annotations:
    backup-exempt-reason: "PNG/MVT tiles generated from grids/; rebuildable by re-running tile generation"
spec:
  accessModes: [ReadWriteMany]
  storageClassName: longhorn
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grids
  namespace: radar-ng
  labels:
    backup-exempt: "true"
  annotations:
    backup-exempt-reason: "MRMS NetCDF grids; re-fetchable from upstream MRMS within retention window"
spec:
  accessModes: [ReadWriteMany]
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: state
  namespace: radar-ng
  labels:
    backup-exempt: "true"
  annotations:
    backup-exempt-reason: "Transient ingestion state (last-seen timestamps, partial frames); regenerates on next pull"
spec:
  accessModes: [ReadWriteMany]
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openmeteo-data
  namespace: radar-ng
  labels:
    backup-exempt: "true"
  annotations:
    backup-exempt-reason: "Open-Meteo numerical weather data cache; re-fetchable from open-meteo.com API"
spec:
  accessModes: [ReadWriteMany]
  storageClassName: longhorn
  resources:
    requests:
      storage: 30Gi
