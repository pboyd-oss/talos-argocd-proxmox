# Lightning ingestor — streams Blitzortung realtime strikes over websocket,
# maintains a 15-minute rolling GeoJSON buffer at /data/state/lightning.json
# served by tile-server at /api/lightning.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-lightning
  namespace: radar-ng
  labels:
    app: ingest-lightning
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ingest-lightning
  template:
    metadata:
      labels:
        app: ingest-lightning
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ingest-lightning
          image: registry.tuxgrid.com/radar-ng-ingest-lightning:v1.0.5
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: STATE_DIR
              value: /data/state
            - name: LIGHTNING_RETENTION_MIN
              value: "15"
          volumeMounts:
            - { name: state, mountPath: /data/state }
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - { name: state, persistentVolumeClaim: { claimName: state } }
