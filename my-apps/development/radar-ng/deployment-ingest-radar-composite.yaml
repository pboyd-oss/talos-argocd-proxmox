# Composite reflectivity ingestor — runs the SAME image as ingest-mrms but
# pointed at MRMS_PREFIX=CONUS/MergedReflectivityComposite_00.50 (full-atmosphere
# composite, what AccuWeather/Apple Weather actually show) and writes to
# /data/tiles/radar-composite/. Layer name is exposed in the manifest so the
# client can show it as its own picker option.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-radar-composite
  namespace: radar-ng
  labels:
    app: ingest-radar-composite
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ingest-radar-composite
  template:
    metadata:
      labels:
        app: ingest-radar-composite
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ingest-radar-composite
          image: registry.tuxgrid.com/radar-ng-ingest-mrms:v1.0.5
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: MRMS_PREFIX
              value: CONUS/MergedReflectivityComposite_00.50
            - name: LAYER_NAME
              value: radar-composite
            - name: TILE_DIR
              value: /data/tiles
            - name: STATE_DIR
              value: /data/state
            - name: GRID_DIR
              value: /data/grids
            - name: PALETTES
              value: classic,vivid,muted
            - name: POLL_INTERVAL
              value: "120"
            - name: BACKLOG_PER_CYCLE
              value: "3"
            - name: LOG_LEVEL
              value: INFO
          volumeMounts:
            - { name: tiles, mountPath: /data/tiles }
            - { name: state, mountPath: /data/state }
            - { name: grids, mountPath: /data/grids }
          resources:
            requests:
              cpu: 1000m
              memory: 1Gi
            limits:
              cpu: 6000m
              memory: 6Gi
      volumes:
        - { name: tiles, persistentVolumeClaim: { claimName: tiles } }
        - { name: state, persistentVolumeClaim: { claimName: state } }
        - { name: grids, persistentVolumeClaim: { claimName: grids } }
