# radar-ng Temporal worker — TemporalWorkerDeployment CR.
#
# Lives in the radar-ng namespace (NOT a separate worker namespace, the way
# news-reader-temporal-worker does it) because the worker needs to mount the
# same Longhorn PVCs the API + legacy ingestors already use. PVCs are
# namespace-scoped; sharing a namespace is the simplest answer.
#
# The Temporal Worker Controller injects TEMPORAL_ADDRESS, TEMPORAL_NAMESPACE,
# TEMPORAL_DEPLOYMENT_NAME, TEMPORAL_WORKER_BUILD_ID into every Pod — do not
# set them via env here.
#
# Image is built by .gitea/workflows/build-temporal-worker.yml. Renovate
# auto-PRs bumps. Each tag bump becomes a new build_id + progressive rollout.
apiVersion: temporal.io/v1alpha1
kind: TemporalWorkerDeployment
metadata:
  name: radar-ng-worker
  namespace: radar-ng
  labels:
    app: radar-ng-worker
spec:
  replicas: 2
  workerOptions:
    connectionRef:
      name: cluster-temporal
    temporalNamespace: default
  rollout:
    # Same progressive shape as news-reader-temporal-worker. Tune per
    # workload — radar ingest is more time-sensitive than news.
    strategy: Progressive
    steps:
      - rampPercentage: 10
        pauseDuration: 2m
      - rampPercentage: 50
        pauseDuration: 5m
  sunset:
    scaledownDelay: 10m
    deleteDelay: 1h
  template:
    metadata:
      labels:
        app: radar-ng-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: registry.vanillax.me/radar-ng-temporal-worker:v1.0.5
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://opentelemetry-collector.observability:4317
            - name: TILE_DIR
              value: /data/tiles
            - name: STATE_DIR
              value: /data/state
            - name: GRID_DIR
              value: /data/grids
          envFrom:
            - configMapRef: { name: radar-ng-temporal-config }
            - secretRef:    { name: radar-ng-temporal-secrets, optional: true }
          volumeMounts:
            - { name: tiles,  mountPath: /data/tiles }
            - { name: grids,  mountPath: /data/grids }
            - { name: state,  mountPath: /data/state }
            - { name: push-keys, mountPath: /secrets, readOnly: true }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "4Gi" }
      volumes:
        - name: tiles
          persistentVolumeClaim: { claimName: tiles }
        - name: grids
          persistentVolumeClaim: { claimName: grids }
        - name: state
          persistentVolumeClaim: { claimName: state }
        - name: push-keys
          secret:
            secretName: radar-ng-temporal-secrets
            optional: true
            items:
              - { key: APNS_KEY,             path: apns.p8 }
              - { key: FCM_CREDENTIALS_JSON, path: fcm.json }
