apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: backstage

resources:
  - namespace.yaml
  - httproute.yaml
  - sealedsecret.yaml
  - db-sealedsecret.yaml

helmCharts:
  - name: backstage
    repo: https://backstage.github.io/charts
    version: 2.7.0
    releaseName: backstage
    namespace: backstage
    valuesFile: values.yaml
