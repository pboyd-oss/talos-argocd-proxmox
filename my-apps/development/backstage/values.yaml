backstage:
  replicas: 1

  image:
    registry: harbor.tuxgrid.com
    repository: platform/backstage
    tag: "latest"
    pullPolicy: IfNotPresent

  # TLS terminated at gateway-internal; Backstage speaks plain HTTP internally.
  appConfig:
    app:
      title: Backstage
      baseUrl: https://backstage.tuxgrid.com
    backend:
      baseUrl: https://backstage.tuxgrid.com
      listen:
        port: 7007
      cors:
        origin: https://backstage.tuxgrid.com
      database:
        client: pg
        pluginDivisionMode: schema
        connection:
          host: backstage-database-rw.cloudnative-pg.svc.cluster.local
          port: 5432
          user: backstage
          database: backstage
          password:
            $env: POSTGRES_PASSWORD

    auth:
      environment: production
      providers:
        github:
          production:
            clientId:
              $env: GITHUB_CLIENT_ID
            clientSecret:
              $env: GITHUB_CLIENT_SECRET

    integrations:
      github:
        - host: github.com
          token:
            $env: GITHUB_TOKEN

    catalog:
      providers:
        github:
          default:
            organization: pboyd-oss
            catalogPath: /catalog-info.yaml
            filters:
              branch: main
      locations:
        - type: url
          target: https://github.com/pboyd-oss/backstage-templates/blob/main/all-templates.yaml
          rules:
            - allow: [Template]

  startupProbe:
    failureThreshold: 60
    periodSeconds: 10
    timeoutSeconds: 5

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 768Mi
      cpu: 1000m

  extraEnvVars:
    - name: NODE_OPTIONS
      value: "--max-old-space-size=512"

  # Inject DB and GitHub credentials from sealed secrets
  extraEnvVarsSecrets:
    - backstage-credentials
    - backstage-db

  strategy:
    type: Recreate

# Disable bundled PostgreSQL — using CNPG cluster instead
postgresql:
  enabled: false

service:
  type: ClusterIP
  ports:
    backend: 7007
    name: http-backend
    targetPort: backend

serviceAccount:
  create: true
