# Backstage credentials — GitHub OAuth app + PAT for catalog access.
# Lives in backstage namespace; referenced via extraEnvVarsSecrets: [backstage-credentials].
#
# Regenerate:
#   kubectl create secret generic backstage-credentials \
#     --namespace backstage \
#     --from-literal=GITHUB_CLIENT_ID=<oauth-client-id> \
#     --from-literal=GITHUB_CLIENT_SECRET=<oauth-client-secret> \
#     --from-literal=GITHUB_TOKEN=<personal-access-token> \
#     --dry-run=client -o yaml | \
#     kubeseal --controller-name=sealed-secrets --controller-namespace=sealed-secrets --format yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: backstage-credentials
  namespace: backstage
spec:
  encryptedData:
    GITHUB_CLIENT_ID: 
    GITHUB_CLIENT_SECRET: 
    GITHUB_TOKEN: 
  template:
    metadata:
      name: backstage-credentials
      namespace: backstage
