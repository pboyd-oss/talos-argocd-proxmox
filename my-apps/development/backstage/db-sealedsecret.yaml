# DB password for the Backstage app — lives in backstage namespace.
# Must contain the same password as backstage-app-secret in cloudnative-pg namespace.
#
# Regenerate:
#   kubectl create secret generic backstage-db \
#     --namespace backstage \
#     --from-literal=POSTGRES_PASSWORD=<SAME_PASSWORD_AS_backstage-app-secret> \
#     --dry-run=client -o yaml | \
#     kubeseal --controller-name=sealed-secrets --controller-namespace=sealed-secrets --format yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: backstage-db
  namespace: backstage
spec:
  encryptedData:
    POSTGRES_PASSWORD: 
  template:
    metadata:
      name: backstage-db
      namespace: backstage
