use_default_settings: true

server:
    base_url: 'https://search.tuxgrid.com'  # Remove trailing slash
    secret_key: "${SEARXNG_SECRET_KEY}"  # Use from secret
    bind_address: "0.0.0.0"
    port: 8080  # Match with deployment port
    public_instance: true
    limiter: true  # Enable limiter
    method: "GET"  # Allow both GET and POST
    http_protocol_version: "1.0"
    default_http_headers:
        X-Content-Type-Options: nosniff
        X-Download-Options: noopen
        X-Robots-Tag: noindex, nofollow
        Referrer-Policy: no-referrer
        Access-Control-Allow-Origin: "*"
        Access-Control-Allow-Methods: "GET, POST, OPTIONS"

valkey:
    url: valkey://redis:6379/0

search:
    safe_search: 0
    formats:
        - html
        - json
        - csv
        - rss
    format_by_default: false
    autocomplete: "duckduckgo"
    default_lang: "en-US"
    ban_time_on_fail: 5
    max_ban_time_on_fail: 120
    suspended_times:
        SearxEngineAccessDenied: 180
        SearxEngineCaptcha: 3600
        SearxEngineTooManyRequests: 180
        cf_SearxEngineCaptcha: 1296000
        cf_SearxEngineAccessDenied: 86400
        recaptcha_SearxEngineCaptcha: 604800

ui:
    static_use_hash: true
    default_theme: simple
    theme_args:
        simple_style: dark

enabled_plugins:
    - 'Hash plugin'
    - 'Self Information'
    - 'Tracker URL remover'
    - Basic Calculator
    - Hostnames plugin
    - Open Access DOI rewrite
    - Self Informations
    - Unit converter plugin

hostnames:
    high_priority:
        - (.*)\/blog\/(.*)
        - (.*\.)?wikipedia.org$
        - (.*\.)?github.com$
        - (.*\.)?reddit.com$
        - (.*\.)?linuxserver.io$
        - (.*\.)?docker.com$
        - (.*\.)?archlinux.org$
        - (.*\.)?stackoverflow.com$
        - (.*\.)?askubuntu.com$
        - (.*\.)?superuser.com$
    replace:
        (www\.)?reddit\.com$: redlib.tuxgrid.com

engines:
    # Google is disabled: its frontend parser broke in 2026.4.17
    # (google.py:385 IndexError: list index out of range when
    # extracting content_nodes[0]). Upstream fix is PR #5984, still
    # an unmerged POC — bumping the image won't help. Re-enable once
    # that PR lands in a tagged release.
    - name: google
      disabled: true
    - name: duckduckgo
      disabled: false
    # Bing gets rate-limited hard when called from a datacenter IP range
    # and then SearXNG auto-suspends it for 180s (SearxEngineAccessDenied).
    # Left enabled because when it works the results are good, but it
    # is NOT relied on as a primary — the brave/startpage/qwant trio
    # below is what keeps general search alive when bing is suspended.
    - name: bing
      disabled: false
    - name: brave
      disabled: false
    - name: startpage
      disabled: false
    - name: qwant
      disabled: false
    - name: mojeek
      disabled: false
    - name: wikipedia
      disabled: false
    - name: stackoverflow
      disabled: false
    - name: github
      disabled: false
    # Kiwix engine removed - not available in SearXNG 2025.10.17
    # Re-add when upgrading SearXNG to a version with kiwix engine support

outgoing:
    # Bumped from 3s -> 6s because Vane/Perplexica fires 3 parallel
    # research queries; brave/startpage/qwant can take 2-4s on a cold
    # connection and were getting suspended as "too slow" under the
    # 3s timeout. max_request_timeout stays the hard ceiling.
    request_timeout: 6.0
    max_request_timeout: 15.0
    pool_connections: 100
    pool_maxsize: 20
    enable_http2: true

categories_order:
    - general
    - files
    - images
    - videos
    - news
    - map
    - it
    - science
    - social media

categories:
    general:
        default: true
    files:
        default: false
    images:
        default: false
    videos:
        default: false
    news:
        default: false
    map:
        default: false
    it:
        default: false
    science:
        default: false
    social media:
        default: false

default_preferences:
    language: "en-US"
    locale: "en"
    autocomplete: "duckduckgo"
    image_proxy: true
    method: "GET"
    safesearch: 1
    theme: "simple"