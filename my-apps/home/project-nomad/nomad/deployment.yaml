apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-nomad
  namespace: project-nomad
  labels:
    app: project-nomad
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: project-nomad
  template:
    metadata:
      labels:
        app: project-nomad
      annotations:
        instrumentation.opentelemetry.io/inject-nodejs: "opentelemetry/default"
    spec:
      initContainers:
        - name: init-storage
          image: busybox:1.37
          command: ["sh", "-c", "mkdir -p /app/storage/logs"]
          volumeMounts:
            - name: nomad-storage
              mountPath: /app/storage
        - name: migrate
          image: ghcr.io/pboyd-oss/project-nomad:sha-593d3f4
          command: ["sh", "-c", "node ace migration:run --force && node ace db:seed"]
          envFrom:
            - configMapRef:
                name: project-nomad-config
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: project-nomad-secrets
                  key: APP_KEY
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: project-nomad-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: nomad-storage
              mountPath: /app/storage
      containers:
        - name: project-nomad
          image: ghcr.io/pboyd-oss/project-nomad:sha-593d3f4
          command: ["sh", "-c", "node ace queue:work --all & exec node bin/server.js"]
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: project-nomad-config
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: project-nomad-secrets
                  key: APP_KEY
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: project-nomad-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 25m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: nomad-storage
              mountPath: /app/storage
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: nomad-storage
          persistentVolumeClaim:
            claimName: nomad-storage
