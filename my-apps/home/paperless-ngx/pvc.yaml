apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: data
    backup: "hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  # dataSourceRef is added dynamically by Kyverno if a backup exists
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: media
    backup: "hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn
  # dataSourceRef is added dynamically by Kyverno if a backup exists
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-export-pvc
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: export
    backup-exempt: "true"
  annotations:
    backup-exempt-reason: "Paperless export staging dir; content is rebuildable from /media which has backup=hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-consume-pvc
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: consume
    backup-exempt: "true"
  annotations:
    backup-exempt-reason: "Paperless consume inbox; transient — files move to /media after ingestion"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
