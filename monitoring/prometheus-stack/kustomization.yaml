apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: prometheus-stack
resources:
  - ns.yaml
  - alertmanager-http-route.yaml
  - grafana-http-route.yaml
  - prometheus-http-route.yaml
  - custom-alerts.yaml
  - custom-servicemonitors.yaml
  - longhorn-backup-alerts.yaml
  - volsync-alerts.yaml # VolSync backup/restore alerts
  - dcgm-exporter.yaml # DCGM GPU monitoring
  - gpu-alerts.yaml # GPU alerting rules
  - gpu-dashboard.yaml # Grafana dashboard
  - etcd-dashboard.yaml # etcd cluster dashboard (Grafana 3070; pairs with kube-etcd scrape job)
  - network-policy.yaml # Allow Grafana to access Prometheus
  - frigate-dashboard.yaml # Frigate Grafana dashboard
  - loki-logs-dashboard.yaml # Custom Loki logs dashboard (uses OTEL labels)
  - solar-dashboard.yaml # Epever Solar MPPT dashboard
  - tapo-power-dashboard.yaml # Tapo smart plug power monitoring
  - radar-ng-dashboard.yaml # radar-ng backend dashboard (logs + tile-server metrics)
  - radar-ng-mobile-dashboard.yaml # radar-ng mobile app dashboard (Tempo spans + Loki errors)
# Strategic merge patches to handle resource conflicts
patchesStrategicMerge:
  - alertmanager-config.yaml
helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 84.1.0
    releaseName: kube-prometheus-stack
    namespace: prometheus-stack
    valuesFile: values.yaml
    includeCRDs: true # This is the key setting!
