# omnictl cluster template sync -v -f cluster-template-working.yaml
---
kind: Cluster
name: talos-prod-cluster
labels:
  cluster-id: "1"
kubernetes:
  version: v1.36.0
talos:
  # v1.13.0-rc.0 released 2026-04-16 (beta.1 had an init segfault loop on CP
  # nodes in Proxmox). Bump to v1.13.0 once GA (scheduled 2026-04-27).
  # Requires Omni server started with --enable-talos-pre-release-versions.
  version: v1.13.0-rc.0
patches:
- name: disable-default-cni
  inline:
    cluster:
      network:
        cni:
          name: none
      proxy:
        disabled: true
- name: dns-resolver
  inline:
    apiVersion: v1alpha1
    kind: ResolverConfig
    nameservers:
    - address: 192.168.100.1
# Talos 1.13 switched install/upgrade to the LifecycleService API; without an
# explicit install.disk, fresh VMs fail with "system disk not found" in
# maintenanceUpgrade. virtio-scsi-single + scsi0 presents as /dev/sda in all
# three machine classes, so this is safe to apply cluster-wide.
- name: install-disk
  inline:
    machine:
      install:
        disk: /dev/sda
- file: patches/docker-hub-auth.yaml
- name: node-performance
  inline:
    machine:
      sysctls:
        fs.inotify.max_user_watches: "1048576"
        fs.inotify.max_user_instances: "8192"
        fs.file-max: "2097152"
        vm.swappiness: "10"
        vm.max_map_count: "524288"
        net.core.somaxconn: "65535"
        net.core.rmem_max: "67108864"
        net.core.wmem_max: "67108864"
        net.ipv4.tcp_congestion_control: bbr
        net.ipv4.tcp_fastopen: "3"
        net.ipv4.tcp_rmem: 4096 87380 33554432
        net.ipv4.tcp_wmem: 4096 65536 33554432
        net.ipv4.tcp_slow_start_after_idle: "0"
        net.ipv4.tcp_mtu_probing: "1"
        net.ipv4.tcp_tw_reuse: "1"
        net.core.netdev_max_backlog: "16384"
        sunrpc.tcp_slot_table_entries: "128"
        sunrpc.tcp_max_slot_table_entries: "65536"
      udev:
        rules:
        - SUBSYSTEM=="bdi", ACTION=="add", ATTR{read_ahead_kb}="131072"
---
kind: ControlPlane
machineClass:
  name: proxmox-control-plane
  size: 3
systemExtensions:
- siderolabs/iscsi-tools # renovate: datasource=docker depName=siderolabs/iscsi-tools
- siderolabs/nfs-utils # renovate: datasource=docker depName=siderolabs/nfs-utils
- siderolabs/nfsrahead # renovate: datasource=docker depName=siderolabs/nfsrahead
# qemu-guest-agent auto-installed by Proxmox provider (see machine-classes/*.yaml)
- siderolabs/util-linux-tools # renovate: datasource=docker depName=siderolabs/util-linux-tools
patches:
- name: control-plane-performance
  inline:
    cluster:
      apiServer:
        extraArgs:
          max-requests-inflight: "800"
          max-mutating-requests-inflight: "400"
      etcd:
        extraArgs:
          quota-backend-bytes: "8589934592"
          snapshot-count: "5000"
          auto-compaction-mode: "periodic"
          auto-compaction-retention: "5m"
      controllerManager:
        extraArgs:
          concurrent-deployment-syncs: "10"
          concurrent-replicaset-syncs: "10"
          concurrent-namespace-syncs: "20"
      scheduler:
        extraArgs:
          kube-api-qps: "100"
---
kind: Workers
name: workers
machineClass:
  name: proxmox-worker
  size: 3
systemExtensions:
- siderolabs/iscsi-tools # renovate: datasource=docker depName=siderolabs/iscsi-tools
- siderolabs/nfs-utils # renovate: datasource=docker depName=siderolabs/nfs-utils
- siderolabs/nfsrahead # renovate: datasource=docker depName=siderolabs/nfsrahead
# qemu-guest-agent auto-installed by Proxmox provider (see machine-classes/*.yaml)
- siderolabs/util-linux-tools # renovate: datasource=docker depName=siderolabs/util-linux-tools
patches:
- name: kubelet-performance
  inline:
    machine:
      kubelet:
        extraConfig:
          serializeImagePulls: false
- name: longhorn-storage
  inline:
    machine:
      kubelet:
        extraMounts:
        - destination: /var/lib/longhorn
          type: bind
          source: /var/local/longhorn
          options:
          - bind
          - rshared
          - rw
---
kind: Workers
name: gpu-workers
machineClass:
  name: proxmox-gpu-worker
  size: 1
systemExtensions:
- siderolabs/iscsi-tools # renovate: datasource=docker depName=siderolabs/iscsi-tools
# nfs-utils removed — incompatible with NVIDIA drivers on Talos 1.12.x (siderolabs/extensions#1021)
# rpc-statd crash loop corrupts containerd boltdb, taking the entire node down
# qemu-guest-agent auto-installed by Proxmox provider (see machine-classes/gpu-worker.yaml)
- siderolabs/util-linux-tools # renovate: datasource=docker depName=siderolabs/util-linux-tools
- siderolabs/nonfree-kmod-nvidia-production # renovate: datasource=docker depName=siderolabs/nonfree-kmod-nvidia-production
- siderolabs/nvidia-container-toolkit-production # renovate: datasource=docker depName=siderolabs/nvidia-container-toolkit-production
patches:
- name: gpu-worker-labels
  inline:
    machine:
      nodeLabels:
        gpu-worker: "true"
        nvidia.com/gpu: "true"
- name: gpu-network-dhcp
  inline:
    apiVersion: v1alpha1
    kind: DHCPv4Config
    name: ens18
- file: patches/gpu-worker.yaml
- name: kubelet-performance
  inline:
    machine:
      kubelet:
        extraConfig:
          serializeImagePulls: false
- name: longhorn-storage
  inline:
    machine:
      kubelet:
        extraMounts:
        - destination: /var/lib/longhorn
          type: bind
          source: /var/local/longhorn
          options:
          - bind
          - rshared
          - rw
